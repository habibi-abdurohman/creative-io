<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner.io</title>

    <link rel="stylesheet" href="navbar/navbar.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #f4f7fb;
            --card: #ffffff;
            --card2: #f8fbff;
            --text: #0f172a;
            --muted: #64748b;
            --border: #dbe4ee;
            --primary: #2563eb;
            --primary-soft: #dbeafe;
            --success: #10b981;
            --danger: #ef4444;
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
            --radius: 26px;
        }

        /* DARK MODE */
        body.dark {
            --bg: #020617;
            --card: #0f172a;
            --card2: #111c2d;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #1e293b;
            --primary: #3b82f6;
            --primary-soft: rgba(59,130,246,0.16);
            --shadow: 0 15px 35px rgba(0,0,0,0.35);
        }

        body {
            font-family: Inter, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: 70px 14px 14px 14px;
            transition: 0.25s;
        }

        /* LAYOUT */
        .wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 16px;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            box-shadow: var(--shadow);
            min-width: 0;
        }

        /* CARD HEADER */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .card-title h2 {
            font-size: 19px;
            font-weight: 900;
        }

        .card-title p {
            font-size: 12px;
            color: var(--muted);
            font-weight: 600;
        }

        .counter {
            background: var(--primary-soft);
            color: var(--primary);
            padding: 8px 13px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 900;
            white-space: nowrap;
        }

        /* FORM STYLE */
        .form {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 16px;
        }

        .input-wrap {
            position: relative;
        }

        .input-wrap span {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            font-weight: 900;
            color: var(--muted);
        }

        .input-wrap input {
            width: 100%;
            border: 1px solid var(--border);
            background: var(--card2);
            border-radius: 18px;
            color: var(--text);
            padding: 14px 14px 14px 86px;
            font-size: 13px;
            outline: none;
            transition: 0.2s;
        }

        .input-wrap input:focus {
            border-color: var(--primary);
        }

        .add-btn {
            border: none;
            background: linear-gradient(90deg, var(--primary), #4f46e5);
            color: white;
            padding: 14px;
            border-radius: 18px;
            font-size: 14px;
            font-weight: 900;
            cursor: pointer;
        }

        /* LIST & ITEMS */
        .list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .item {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 22px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .item-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }

        .item-title {
            font-size: 14px;
            font-weight: 900;
            line-height: 1.45;
            overflow-wrap: anywhere;
        }

        .date-badge {
            margin-top: 7px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 800;
        }

        .right-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }

        .done-btn, .delete-btn {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .done-btn {
            border: 2px solid var(--border);
            background: transparent;
            font-size: 17px;
        }

        .done-btn.active {
            background: var(--success);
            border-color: var(--success);
            color: white;
        }

        .delete-btn {
            border: none;
            background: rgba(239,68,68,0.12);
            color: var(--danger);
            font-size: 14px;
        }

        .link-box {
            width: 100%;
            overflow-x: auto;
            background: var(--primary-soft);
            color: var(--primary);
            border-radius: 16px;
            padding: 12px 13px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
            cursor: text;
        }

        .completed { opacity: 0.6; }
        .completed .item-title { text-decoration: line-through; }

        .empty { text-align: center; padding: 22px; font-size: 13px; color: var(--muted); }

        /* MOBILE */
        @media(max-width: 600px) {
            body { padding: 70px 10px 10px 10px; }
            .wrapper { grid-template-columns: 1fr; }
            .card { border-radius: 22px; }
        }
    </style>
</head>

<body>
    <div id="navbar-container"></div>

    <div class="wrapper">
        <div class="card">
            <div class="card-top">
                <div class="card-title">
                    <h2>🎬 Channel 1</h2>
                </div>
                <div class="counter" id="count1">0 Ide</div>
            </div>

            <div class="form">
                <div class="input-wrap">
                    <span>Konten</span>
                    <input type="text" id="t1" placeholder="Judul ide konten...">
                </div>
                <div class="input-wrap">
                    <span>Tanggal</span>
                    <input type="text" id="d1" placeholder="Misal: 21 April / Segera">
                </div>
                <div class="input-wrap">
                    <span>Link</span>
                    <input type="url" id="l1" placeholder="fb / tiktok / ig / yt">
                </div>
                <button class="add-btn" onclick="saveData(1)">+ Tambah Ide</button>
            </div>

            <div class="list" id="list1"></div>
        </div>

        <div class="card">
            <div class="card-top">
                <div class="card-title">
                    <h2>📱 Channel 2</h2>
                </div>
                <div class="counter" id="count2">0 Ide</div>
            </div>

            <div class="form">
                <div class="input-wrap">
                    <span>Konten</span>
                    <input type="text" id="t2" placeholder="Judul ide konten...">
                </div>
                <div class="input-wrap">
                    <span>Tanggal</span>
                    <input type="text" id="d2" placeholder="Misal: 21 April / Segera">
                </div>
                <div class="input-wrap">
                    <span>Link</span>
                    <input type="url" id="l2" placeholder="fb / tiktok / ig / yt">
                </div>
                <button class="add-btn" onclick="saveData(2)">+ Tambah Ide</button>
            </div>

            <div class="list" id="list2"></div>
        </div>
    </div>

    <script>
        /* THEME & INITIAL LOAD */
        window.addEventListener('load', () => {
            if (localStorage.getItem("dashboard_theme") === "dark") {
                document.body.classList.add("dark");
            }
            render(1);
            render(2);
        });

        function toggleTheme() {
            document.body.classList.toggle("dark");
            localStorage.setItem("dashboard_theme", document.body.classList.contains("dark") ? "dark" : "light");
        }

        /* STORAGE LOGIC */
        const getKey = (ch) => "planner_" + ch;
        const loadData = (ch) => JSON.parse(localStorage.getItem(getKey(ch))) || [];
        const saveStorage = (ch, data) => localStorage.setItem(getKey(ch), JSON.stringify(data));

        /* ACTIONS */
        function saveData(ch) {
            const title = document.getElementById("t" + ch).value.trim();
            const date = document.getElementById("d" + ch).value.trim();
            const link = document.getElementById("l" + ch).value.trim();

            if (title === "" || date === "" || link === "") {
                alert("Isi semua form!");
                return;
            }

            const data = loadData(ch);
            data.unshift({ title, date, link, done: false });
            saveStorage(ch, data);

            document.getElementById("t" + ch).value = "";
            document.getElementById("d" + ch).value = "";
            document.getElementById("l" + ch).value = "";
            render(ch);
        }

        function toggleDone(ch, index) {
            const data = loadData(ch);
            data[index].done = !data[index].done;
            saveStorage(ch, data);
            render(ch);
        }

        function deleteIdea(ch, index) {
            if (confirm("Hapus ide ini?")) {
                const data = loadData(ch);
                data.splice(index, 1);
                saveStorage(ch, data);
                render(ch);
            }
        }

        function selectText(el) {
            const range = document.createRange();
            range.selectNodeContents(el);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
        }

        /* RENDER UI */
        function render(ch) {
            const box = document.getElementById("list" + ch);
            const counter = document.getElementById("count" + ch);
            const data = loadData(ch);

            counter.innerText = data.length + " Ide";

            if (data.length === 0) {
                box.innerHTML = `<div class="empty">Belum ada ide tersimpan</div>`;
                return;
            }

            box.innerHTML = data.map((item, index) => `
                <div class="item ${item.done ? "completed" : ""}">
                    <div class="item-top">
                        <div class="title-area">
                            <div class="item-title">Konten ${item.title}</div>
                            <div class="date-badge">📅 ${item.date}</div>
                        </div>
                        <div class="right-actions">
                            <button class="done-btn ${item.done ? "active" : ""}" onclick="toggleDone(${ch}, ${index})">
                                ${item.done ? "✓" : ""}
                            </button>
                            <button class="delete-btn" onclick="deleteIdea(${ch}, ${index})">🗑</button>
                        </div>
                    </div>
                    <div class="link-box" onclick="selectText(this)">${item.link}</div>
                </div>
            `).join("");
        }
    </script>

    <script src="navbar/navbar.js"></script>
</body>
</html>
