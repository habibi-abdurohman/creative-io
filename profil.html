<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Profil Saya - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon-192x192.png">

    <link rel="stylesheet" href="./navbar/navbar.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#f8fbff" id="themeColorMeta">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }

        :root {
            --bg-grad: #f8fbff; --card-glass: rgba(255, 255, 255, 0.95); --card-solid: #ffffff;
            --card-tint: #f1f5f9; --border: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b;
            --primary: #2563eb; --primary-grad: linear-gradient(135deg, #3b82f6, #2563eb);
            --primary-soft: rgba(37, 99, 235, 0.1); --success: #16a34a; --danger: #ef4444;
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.04); --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius-btn: 14px; --radius-card: 24px;
        }

        body.dark {
            --bg-grad: #0f172a; --card-glass: rgba(30, 41, 59, 0.95); --card-solid: #1e293b;
            --card-tint: #334155; --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8;
        }

        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-grad); color: var(--text-main); min-height: 100vh; padding: 86px 16px 100px; transition: background 0.3s, color 0.3s; }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }

        .wrapper { position: relative; z-index: 2; max-width: 550px; margin: 0 auto; }

        .profile-card { background: var(--card-glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 40px 24px 32px; box-shadow: var(--shadow-flat); text-align: center; opacity: 0; transform: translateY(10px); animation: fadeUp 0.5s cubic-bezier(0.165, 0.84, 0.44, 1) forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .avatar-wrap { position: relative; width: 110px; height: 110px; margin: 0 auto 32px; }
        .avatar-preview { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 4px solid var(--card-solid); box-shadow: 0 8px 24px rgba(0,0,0,0.08); background: var(--card-tint); transition: 0.3s; }
        
        .avatar-loading { position: absolute; inset: 4px; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--primary); z-index: 5; opacity: 0; pointer-events: none; transition: 0.2s ease; }
        .avatar-loading.active { opacity: 1; pointer-events: auto; }
        body.dark .avatar-loading { background: rgba(30, 41, 59, 0.7); color: #60a5fa; }
        @keyframes spinAvatar { 100% { transform: rotate(360deg); } }
        .spin-icon { animation: spinAvatar 1s linear infinite; }

        .btn-upload svg, .btn-delete-avatar svg { display: block; }
        .btn-upload { position: absolute; bottom: 0; right: 0; width: 34px; height: 34px; background: var(--primary-grad); color: white; border: 2px solid var(--card-solid); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.3); z-index: 10; }
        .btn-upload:hover { transform: scale(1.1); box-shadow: 0 6px 14px rgba(37, 99, 235, 0.4); }
        .btn-upload:active { transform: scale(0.9); }
        
        .btn-delete-avatar { position: absolute; top: 0; left: 0; width: 34px; height: 34px; background: var(--card-solid); color: var(--danger); border: 2px solid var(--card-solid); border-radius: 50%; display: none; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.06); z-index: 10; outline: none; padding: 0; }
        .btn-delete-avatar:hover { transform: scale(1.1); background: var(--danger); color: white; }
        .btn-delete-avatar:active { transform: scale(0.9); }
        body.dark .btn-delete-avatar { background: var(--card-tint); border-color: var(--card-solid); }

        #fileInput { display: none; }

        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 13px; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .form-group input { width: 100%; border: 1px solid var(--border); background: var(--card-solid); color: var(--text-main); padding: 14px 16px; border-radius: 14px; font-size: 14px; font-weight: 600; outline: none; transition: 0.2s; font-family: inherit;}
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .form-group input:disabled { background: var(--card-tint); color: var(--text-muted); cursor: not-allowed; border-color: transparent;}

        .divider { height: 1px; background: var(--border); margin: 28px 0; }
        .security-title { font-size: 14px; font-weight: 800; margin-bottom: 4px; text-align: left; }
        .security-desc { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; line-height: 1.5; text-align: left; }

        .btn-save { width: 100%; border: none; background: var(--primary-grad); color: white; padding: 16px; border-radius: 16px; font-size: 14px; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(37,99,235,0.25); outline: none; font-family: inherit;}
        .btn-save:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37,99,235,0.35); }
        .btn-save:active { transform: scale(0.96); }
        
        .btn-reset-pw, .btn-delete-account { width: 100%; padding: 14px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; outline: none; font-family: inherit; transition: 0.2s; margin-bottom: 12px; }
        .btn-reset-pw { border: 1px solid var(--border); background: var(--card-tint); color: var(--text-main); }
        .btn-reset-pw:hover { background: var(--border); }
        .btn-delete-account { border: 1px solid rgba(239, 68, 68, 0.3); background: transparent; color: var(--danger); margin-bottom: 0;}
        .btn-delete-account:hover { background: rgba(239, 68, 68, 0.05); border-color: var(--danger); }

        .toast { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: var(--success); color: white; padding: 12px 24px; border-radius: 999px; font-size: 13px; font-weight: 800; z-index: 10000; transition: bottom 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); box-shadow: 0 10px 30px rgba(22, 163, 74, 0.3);}
        .toast.show { bottom: 40px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--card-solid); width: 100%; max-width: 380px; border-radius: var(--radius-card); padding: 32px; box-shadow: var(--shadow-float); border: none; text-align: center; font-family: inherit; transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-card { transform: scale(1); opacity: 1; }
        
        .modal-icon { font-size: 48px; margin-bottom: 12px; }
        .modal-card h3 { font-size: 20px; font-weight: 900; margin-bottom: 8px; color: var(--text-main); }
        .modal-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 24px; line-height: 1.5; }
        .modal-actions { display: flex; gap: 12px; }
        .btn-modal { flex: 1; padding: 14px; border-radius: var(--radius-btn); font-size: 13px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; outline: none; font-family: inherit;}
        .btn-cancel { background: var(--card-tint); color: var(--text-main); border: 1px solid var(--border); }
        .btn-confirm-delete { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="profile-card">
            <div class="avatar-wrap">
                <img src="" alt="" class="avatar-preview" id="avatarPreview">
                
                <div class="avatar-loading" id="avatarLoading">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="spin-icon"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                </div>

                <label for="fileInput" class="btn-upload" title="Pilih Foto Baru">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path><circle cx="12" cy="13" r="4"></circle></svg>
                </label>
                
                <button type="button" class="btn-delete-avatar" id="btnDeleteAvatar" onclick="deleteAvatar()" title="Hapus Foto Profil">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
                <input type="file" id="fileInput" accept="image/png, image/jpeg, image/jpg">
            </div>

            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="inputName" placeholder="Masukkan nama Anda..." autocomplete="off">
            </div>

            <div class="form-group">
                <label>Email Terdaftar</label>
                <input type="email" id="inputEmail" disabled>
            </div>

            <button class="btn-save" onclick="saveProfile()">Simpan Perubahan</button>
            
            <div class="divider"></div>
            
            <div class="security-section">
                <div class="security-title">Kata Sandi / Keamanan</div>
                <div class="security-desc">Kelola akses akun dan informasi kredensial Anda di sini.</div>
                
                <button class="btn-reset-pw" onclick="sendResetPasswordLink()">🔒 Kirim Link Ubah Password</button>
                <button class="btn-delete-account" onclick="openDeleteModal()">⚠️ Hapus Akun Saya</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="deleteAccountModal">
        <div class="modal-card">
            <div class="modal-icon">⚠️</div>
            <h3>Yakin Hapus Akun?</h3>
            <p>Semua data profil Anda akan dihapus secara permanen.</p>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeDeleteModal()">Batal</button>
                <button class="btn-modal btn-confirm-delete" id="confirmDeleteBtn" onclick="confirmDeleteAccount()">Ya, Hapus</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toastMsg">✅ Profil berhasil diperbarui!</div>

    <script src="./navbar/navbar.js"></script>
    <script src="./js/pwa.js"></script>
