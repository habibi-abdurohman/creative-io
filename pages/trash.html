    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="wrapper">
        <div class="page-header">
            <div class="header-title">
                <h1>🗑️ Tempat Sampah</h1>
                <p>Item di sini akan otomatis dihancurkan secara permanen setelah 30 hari.</p>
            </div>
            <button class="btn-empty-trash" onclick="emptyTrash()">Kosongkan Sampah</button>
        </div>
        <div class="filter-wrap">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                Semua <span class="badge-count" id="countAll">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('script', this)">
                📝 Script <span class="badge-count" id="countScript">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('notes', this)">
                📌 Notes <span class="badge-count" id="countNotes">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('planner', this)">
                📅 Ideas <span class="badge-count" id="countIdeas">0</span>
            </button>
        </div>
        <div class="trash-list" id="trashList">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 30vh; color: var(--text-muted); width: 100%;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px; margin-top: 12px;">Memeriksa riwayat sampah...</div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="progressModal">
        <div class="modal-card">
            <div style="display: flex; justify-content: center; margin-bottom: 20px;">
                <svg id="progressSpinner" xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div id="progressSuccess" style="display: none; font-size: 46px; line-height: 1;">✅</div>
            </div>
            <h3 id="progressTitle">Mengosongkan Sampah</h3>
            <p id="progressText">Menyiapkan proses...</p>
        </div>
    </div>
