<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trash - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">

    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#f8fbff" id="themeColorMeta">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        
        :root { 
            --bg-grad: #f8fbff; 
            --card-glass: rgba(255, 255, 255, 0.95); 
            --card-solid: #ffffff; 
            --card-tint: #f1f5f9; 
            --border: #e2e8f0; 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --primary: #2563eb; 
            --primary-soft: rgba(37, 99, 235, 0.1); 
            --success: #16a34a; 
            --danger: #ef4444; 
            --danger-soft: rgba(239, 68, 68, 0.1); 
            --warning: #f59e0b; 
            --warning-soft: rgba(245, 158, 11, 0.1);
            --purple: #8b5cf6;
            --purple-soft: rgba(139, 92, 246, 0.1);
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.04); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius-btn: 14px; 
            --radius-card: 20px; 
        }
        
        body.dark { 
            --bg-grad: #0f172a; 
            --card-glass: rgba(30, 41, 59, 0.95); 
            --card-solid: #1e293b; 
            --card-tint: #334155; 
            --border: #334155; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --primary-soft: rgba(59, 130, 246, 0.2); 
            --danger-soft: rgba(239, 68, 68, 0.15); 
            --warning-soft: rgba(245, 158, 11, 0.15);
            --purple-soft: rgba(139, 92, 246, 0.15);
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.2); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-grad); color: var(--text-main); min-height: 100vh; padding: 86px 16px 100px; transition: background 0.3s, color 0.3s; }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(239, 68, 68, 0.15); bottom: 100px; right: -100px; }
        
        .wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }
        
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .header-title h1 { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; margin-bottom: 6px;}
        .header-title p { font-size: 14px; color: var(--text-muted); line-height: 1.6; max-width: 450px; }
        
        .btn-empty-trash { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 14px 20px; border-radius: var(--radius-btn); font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; font-family: inherit; outline: none;}
        .btn-empty-trash:hover { background: var(--danger); color: white; transform: translateY(-2px); box-shadow: 0 8px 20px rgba(239, 68, 68, 0.2); border-color: var(--danger); }
        .btn-empty-trash:active { transform: scale(0.96); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; margin-bottom: 12px; }

        .filter-wrap { display: flex; gap: 8px; overflow-x: auto; margin: -4px -4px 24px -4px; padding: 6px 4px 10px 4px; scrollbar-width: none; -webkit-overflow-scrolling: touch; }
        .filter-btn { flex-shrink: 0; padding: 10px 16px; border-radius: var(--radius-btn); background: var(--card-solid); border: 1px solid var(--border); font-size: 13px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; font-family: inherit; outline: none; box-shadow: var(--shadow-flat);}
        .filter-btn:hover { background: var(--card-tint); transform: translateY(-1px);}
        .filter-btn:active { transform: scale(0.96); }
        .filter-btn.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); box-shadow: none;}
        
        .badge-count { background: var(--border); color: var(--text-main); padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 800; margin-left: 4px; transition: 0.2s; }
        body.dark .badge-count { background: #334155; color: #f8fafc;}
        .filter-btn.active .badge-count { background: var(--primary); color: white; }

        .trash-list { 
            display: grid; 
            grid-template-columns: repeat(3, minmax(0, 1fr)); 
            gap: 16px; 
            align-items: stretch;
            opacity: 1;
            transition: opacity 0.4s ease;
        }
        
        .trash-card { 
            min-width: 0; 
            background: var(--card-glass); backdrop-filter: blur(12px); 
            border: 1px solid var(--border); border-radius: var(--radius-card); 
            padding: 16px 20px; 
            box-shadow: var(--shadow-flat); 
            display: flex; flex-direction: column; justify-content: space-between; 
            height: 100%; 
            transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
        }
        
        .trash-card.type-script:hover { border-color: var(--primary); background-color: rgba(37, 99, 235, 0.02); transform: translateY(-4px); box-shadow: var(--shadow-float); }
        body.dark .trash-card.type-script:hover { background-color: rgba(37, 99, 235, 0.05); }

        .trash-card.type-notes:hover { border-color: var(--warning); background-color: rgba(245, 158, 11, 0.02); transform: translateY(-4px); box-shadow: var(--shadow-float); }
        body.dark .trash-card.type-notes:hover { background-color: rgba(245, 158, 11, 0.05); }

        .trash-card.type-planner:hover { border-color: var(--purple); background-color: rgba(139, 92, 246, 0.02); transform: translateY(-4px); box-shadow: var(--shadow-float); }
        body.dark .trash-card.type-planner:hover { background-color: rgba(139, 92, 246, 0.05); }

        .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        
        .source-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .icon-notepad { background: var(--primary-soft); color: var(--primary); }
        .icon-notes { background: var(--warning-soft); color: var(--warning); }
        .icon-planner { background: var(--purple-soft); color: var(--purple); }
        
        .card-info { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 4px; padding-top: 2px;}
        
        .card-title { 
            font-size: 15px; font-weight: 800; color: var(--text-main); 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; 
            line-height: 1.4; 
        }
        .card-desc { 
            font-size: 13px; color: var(--text-muted); 
            line-height: 1.6; height: calc(13px * 1.6 * 2); 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; word-break: break-word;
        }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; padding-top: 12px; border-top: 1px dashed var(--border);}
        
        .badge-countdown { 
            display: inline-flex; align-items: center; justify-content: center; 
            height: 32px; padding: 0 12px; border-radius: 10px; 
            font-size: 11px; font-weight: 800; 
            background: var(--danger-soft); color: var(--danger); 
        }
        .badge-countdown.warning { background: var(--warning-soft); color: var(--warning); }
        
        .card-actions { display: flex; gap: 8px; }
        .btn-action { 
            display: inline-flex; align-items: center; justify-content: center;
            height: 32px; padding: 0 14px; border-radius: 10px; 
            font-size: 12px; font-weight: 800; cursor: pointer; 
            transition: 0.2s; border: none; font-family: inherit; outline: none;
        }
        .btn-restore { background: var(--card-solid); color: var(--primary); border: 1px solid var(--border); }
        .btn-restore:hover { background: var(--primary-soft); border-color: var(--primary); }
        .btn-restore:active { transform: scale(0.92); }
        
        .btn-delete { width: 34px; padding: 0; background: transparent; color: var(--text-muted); font-size: 16px; border: 1px solid var(--border);}
        .btn-delete:hover { color: var(--danger); background: var(--danger-soft); border-color: rgba(239, 68, 68, 0.2);}
        .btn-delete:active { transform: scale(0.92); }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); }
        .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.6; filter: grayscale(1); }
        .empty-text { font-size: 14px; color: var(--text-muted); font-weight: 600; line-height: 1.6; }
        
        @media(max-width: 1024px) { 
            .trash-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } 
        }
        @media(max-width: 600px) { 
            body { padding-top: 68px; }
            .trash-list { grid-template-columns: minmax(0, 1fr); }
            .page-header { flex-direction: column; align-items: stretch; margin-bottom: 16px;} 
            .btn-empty-trash { justify-content: center; width: 100%;} 
            .header-title h1 { font-size: 24px; }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="page-header">
            <div class="header-title">
                <h1>🗑️ Tempat Sampah</h1>
                <p>Item di sini akan otomatis dihapus secara permanen setelah 30 hari.</p>
            </div>
            <button class="btn-empty-trash" onclick="emptyTrash()">Kosongkan Sampah</button>
        </div>

        <div class="filter-wrap">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                Semua <span class="badge-count" id="countAll">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('script', this)">
                📝 Script <span class="badge-count" id="countScript">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('notes', this)">
                📌 Notes <span class="badge-count" id="countNotes">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('planner', this)">
                📅 Ideas <span class="badge-count" id="countIdeas">0</span>
            </button>
        </div>

        <div class="trash-list" id="trashList">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 30vh; color: var(--text-muted); width: 100%;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px; margin-top: 12px;">Memeriksa riwayat sampah...</div>
            </div>
        </div>
    </div>

    <script src="../navbar/navbar.js"></script>
    <script src="../js/pwa.js"></script>
