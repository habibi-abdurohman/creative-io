<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Trash - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">

    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2563eb">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        :root { 
            --bg-grad: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); 
            --card-glass: rgba(255, 255, 255, 0.9); 
            --card-solid: #ffffff; 
            --card-tint: #f1f5f9; 
            --border: #e2e8f0; 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --primary: #2563eb; 
            --primary-soft: rgba(37, 99, 235, 0.1); 
            --success: #16a34a; 
            --danger: #ef4444; 
            --danger-soft: rgba(239, 68, 68, 0.1); 
            --warning: #f59e0b; 
            --warning-soft: rgba(245, 158, 11, 0.1);
            --purple: #8b5cf6;
            --purple-soft: rgba(139, 92, 246, 0.1);
            --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.04); 
            --radius-btn: 14px; 
            --radius-card: 16px; /* Radius lebih ramping */
        }
        body.dark { 
            --bg-grad: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); 
            --card-glass: rgba(30, 41, 59, 0.9); 
            --card-solid: #1e293b; 
            --card-tint: #0f172a; 
            --border: #334155; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --primary-soft: rgba(59, 130, 246, 0.2); 
            --danger-soft: rgba(239, 68, 68, 0.15); 
            --warning-soft: rgba(245, 158, 11, 0.15);
            --purple-soft: rgba(139, 92, 246, 0.15);
            --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.2); 
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-grad); color: var(--text-main); min-height: 100vh; padding: 86px 16px 100px; transition: background 0.3s, color 0.3s; }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }
        
        .wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }
        
        .page-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 16px; }
        .header-title h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; display: flex; align-items: center; gap: 10px; }
        .header-title p { font-size: 13px; color: var(--text-muted); margin-top: 6px; line-height: 1.6; max-width: 450px; }
        
        .btn-empty-trash { background: var(--danger-soft); color: var(--danger); border: 1px solid rgba(239, 68, 68, 0.2); padding: 12px 20px; border-radius: var(--radius-btn); font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-empty-trash:hover { background: var(--danger); color: white; }
        
        /* Filter Button & Analytics Badge */
        .filter-wrap { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 20px; padding-bottom: 4px; scrollbar-width: none; }
        .filter-btn { flex-shrink: 0; padding: 10px 16px; border-radius: 12px; background: var(--card-solid); border: 1px solid var(--border); font-size: 12px; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s; display: flex; align-items: center; gap: 6px; }
        .filter-btn:hover { background: var(--card-tint); }
        .filter-btn.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
        
        .badge-count { background: var(--card-tint); color: var(--text-muted); padding: 2px 8px; border-radius: 8px; font-size: 11px; font-weight: 800; margin-left: 4px; transition: 0.2s; }
        body.dark .badge-count { background: rgba(255,255,255,0.1); }
        .filter-btn.active .badge-count { background: var(--primary); color: white; }

        /* =========================================================
           REVISI: GRID SERAGAM & ANTI "MEMANJANG KE KANAN"
        ========================================================= */
        .trash-list { 
            display: grid; 
            /* minmax(0, 1fr) memaksa item tidak melampaui batas layar walau teksnya panjang */
            grid-template-columns: repeat(3, minmax(0, 1fr)); 
            gap: 16px; 
            align-items: stretch; /* Memastikan tinggi semua card dalam 1 baris sama rata */
        }
        
        /* Desain Card Lebih Ramping & Compact */
        .trash-card { 
            min-width: 0; /* Kunci agar konten tidak memecahkan grid */
            background: var(--card-glass); backdrop-filter: blur(12px); 
            border: 1px solid var(--border); border-radius: var(--radius-card); 
            padding: 14px 16px; 
            box-shadow: var(--shadow-flat); 
            display: flex; flex-direction: column; justify-content: space-between; /* Mendorong footer ke paling bawah */
            height: 100%; /* Memaksa kartu terisi penuh mengikuti stretch grid */
            transition: 0.2s; 
        }
        
        /* Warna Hanya Muncul Saat Hover (Bersih tanpa border-left) */
        .trash-card.type-script:hover { border-color: var(--primary); background-color: rgba(37, 99, 235, 0.02); transform: translateY(-2px); }
        body.dark .trash-card.type-script:hover { background-color: rgba(37, 99, 235, 0.05); }

        .trash-card.type-notes:hover { border-color: var(--warning); background-color: rgba(245, 158, 11, 0.02); transform: translateY(-2px); }
        body.dark .trash-card.type-notes:hover { background-color: rgba(245, 158, 11, 0.05); }

        .trash-card.type-planner:hover { border-color: var(--purple); background-color: rgba(139, 92, 246, 0.02); transform: translateY(-2px); }
        body.dark .trash-card.type-planner:hover { background-color: rgba(139, 92, 246, 0.05); }

        /* Struktur Card Dalam */
        .card-top { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
        
        .source-icon { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
        .icon-notepad { background: var(--primary-soft); color: var(--primary); }
        .icon-notes { background: var(--warning-soft); color: var(--warning); }
        .icon-planner { background: var(--purple-soft); color: var(--purple); }
        
        .card-info { flex: 1; min-width: 0; }
        
        /* KUNCI KESTABILAN: Mengunci teks persis menjadi 3 Baris Total */
        .card-title { 
            font-size: 14px; font-weight: 800; color: var(--text-main); margin-bottom: 4px; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; 
            line-height: 20px; height: 20px; /* Dikunci persis 1 baris */
        }
        .card-desc { 
            font-size: 12px; color: var(--text-muted); 
            line-height: 1.5; 
            height: 36px; /* (12px font * 1.5 line-height) = 18px. 18px * 2 baris = Dikunci persis 36px */
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; 
        }
        
        /* Footer Bersih: Tanpa garis putus-putus, terdorong otomatis ke bawah oleh flex */
        .card-bottom { display: flex; justify-content: space-between; align-items: flex-end; margin-top: auto; }
        
        /* Ukuran Serasi Sisa Waktu & Button */
        .badge-countdown { 
            display: inline-flex; align-items: center; justify-content: center; 
            height: 30px; padding: 0 10px; border-radius: 8px; 
            font-size: 11px; font-weight: 800; 
            background: var(--danger-soft); color: var(--danger); 
        }
        .badge-countdown.warning { background: var(--warning-soft); color: var(--warning); }
        
        .card-actions { display: flex; gap: 6px; }
        .btn-action { 
            display: inline-flex; align-items: center; justify-content: center;
            height: 30px; padding: 0 12px; border-radius: 8px; 
            font-size: 11px; font-weight: 800; cursor: pointer; 
            transition: 0.2s; border: none; 
        }
        .btn-restore { background: var(--card-tint); color: var(--primary); border: 1px solid var(--border); }
        .btn-restore:hover { background: var(--primary-soft); border-color: var(--primary); }
        
        .btn-delete { width: 30px; padding: 0; background: transparent; color: var(--text-muted); font-size: 15px; }
        .btn-delete:hover { color: var(--danger); background: var(--danger-soft); }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 80px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); }
        .empty-icon { font-size: 56px; margin-bottom: 16px; opacity: 0.5; filter: grayscale(1); }
        .empty-text { font-size: 14px; color: var(--text-muted); font-weight: 600; line-height: 1.6; }
        
        /* Media Query Responsive Grid */
        @media(max-width: 1024px) { 
            .trash-list { grid-template-columns: repeat(2, minmax(0, 1fr)); } 
        }
        @media(max-width: 600px) { 
            .trash-list { grid-template-columns: minmax(0, 1fr); }
            .page-header { flex-direction: column; align-items: stretch; } 
            .btn-empty-trash { justify-content: center; } 
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="page-header">
            <div class="header-title">
                <h1>🗑️ Tempat Sampah</h1>
                <p>Item di sini akan otomatis dihancurkan secara permanen setelah 30 hari.</p>
            </div>
            <button class="btn-empty-trash" onclick="emptyTrash()">Kosongkan Sampah</button>
        </div>

        <div class="filter-wrap">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                Semua <span class="badge-count" id="countAll">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('script', this)">
                📝 Script <span class="badge-count" id="countScript">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('notes', this)">
                📌 Notes <span class="badge-count" id="countNotes">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('planner', this)">
                📅 Ideas <span class="badge-count" id="countIdeas">0</span>
            </button>
        </div>

        <div class="trash-list" id="trashList"></div>
    </div>

    <script src="../navbar/navbar.js"></script>
    <script src="../js/pwa.js"></script>
