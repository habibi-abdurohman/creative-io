s:var(--radius-card)}.empty-icon{font-size:56px;margin-bottom:16px;opacity:.6;filter:grayscale(1)}.empty-text{font-size:14px;color:var(--text-muted);font-weight:600;line-height:1.6}.trash-card{min-width:0;backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px 20px;display:flex;flex-direction:column;justify-content:space-between;height:100%;transition:transform .2s,border-color .2s,background-color .2s}.trash-card:hover{border-color:var(--primary);background-color:rgba(37,99,235,.02);transform:translateY(-4px)}body.dark .trash-card:hover{background-color:rgba(37,99,235,.05)}.card-top{display:flex;align-items:flex-start;gap:12px;margin-bottom:12px}.source-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}.icon-notepad{background:var(--primary-soft);color:var(--primary)}.badge-countdown.warning,.icon-notes{background:var(--warning-soft);color:var(--warning)}.icon-planner{background:var(--purple-soft);color:var(--purple)}.card-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:4px;padding-top:2px}.card-title{font-size:15px;font-weight:800;color:var(--text-main);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block;line-height:1.4}.card-desc{font-size:13px;color:var(--text-muted);line-height:1.6;height:calc(13px * 1.6 * 2);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}.card-bottom{display:flex;justify-content:space-between;align-items:flex-end;margin-top:auto;padding-top:12px;border-top:1px dashed var(--border)}.badge-countdown,.btn-action{align-items:center;height:32px;border-radius:10px;font-weight:800}.badge-countdown{display:inline-flex;justify-content:center;padding:0 12px;font-size:11px;background:var(--danger-soft);color:var(--danger)}.card-actions{display:flex;gap:8px}.btn-action{display:inline-flex;justify-content:center;padding:0 14px;font-size:12px;transition:.2s;border:none}.btn-delete,.btn-restore{border:1px solid var(--border)}.btn-restore{background:var(--card-solid);color:var(--primary)}.btn-restore:hover{background:var(--primary-soft);border-color:var(--primary)}.btn-delete:active,.btn-restore:active{transform:scale(.92)}.btn-delete{width:34px;padding:0;background:0 0;color:var(--text-muted);font-size:16px}.btn-delete:hover{color:var(--danger);background:var(--danger-soft);border-color:rgba(239,68,68,.2)}.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:100000;display:none;align-items:center;justify-content:center;padding:20px}.modal-overlay.active{display:flex}.modal-card{background:var(--card-solid);width:100%;max-width:340px;border-radius:var(--radius-card);padding:32px 24px;border:1px solid var(--border);text-align:center;transform:scale(.95);opacity:0;transition:.3s cubic-bezier(.4, 0, .2, 1)}.modal-overlay.active .modal-card{transform:scale(1);opacity:1}.modal-card h3{font-size:18px;font-weight:900;color:var(--text-main);margin-bottom:8px}.modal-card p{font-size:13px;color:var(--text-muted);line-height:1.5;font-weight:600;margin-bottom:0}@media(max-width:1024px){.trash-list{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:600px){body{padding-top:68px}.trash-list{grid-template-columns:minmax(0,1fr)}.page-header{flex-direction:column;align-items:stretch;margin-bottom:16px}.btn-empty-trash{justify-content:center;width:100%}.header-title h1{font-size:24px}}

<body>
    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="wrapper">
        <div class="page-header">
            <div class="header-title">
                <h1>🗑️ Tempat Sampah</h1>
                <p>Item di sini akan otomatis dihancurkan secara permanen setelah 30 hari.</p>
            </div>
            <button class="btn-empty-trash" onclick="emptyTrash()">Kosongkan Sampah</button>
        </div>
        <div class="filter-wrap">
            <button class="filter-btn active" onclick="setFilter('all', this)">
                Semua <span class="badge-count" id="countAll">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('script', this)">
                📝 Script <span class="badge-count" id="countScript">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('notes', this)">
                📒 Notes <span class="badge-count" id="countNotes">0</span>
            </button>
            <button class="filter-btn" onclick="setFilter('planner', this)">
                💡 Ideas <span class="badge-count" id="countIdeas">0</span>
            </button>
        </div>
        <div class="trash-list" id="trashList">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 30vh; color: var(--text-muted); width: 100%;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px; margin-top: 12px;">Memeriksa riwayat sampah...</div>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="progressModal">
        <div class="modal-card">
            <div style="display: flex; justify-content: center; margin-bottom: 20px;">
                <svg id="progressSpinner" xmlns="http://www.w3.org/2000/svg" width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div id="progressSuccess" style="display: none; font-size: 46px; line-height: 1;">✅</div>
            </div>
            <h3 id="progressTitle">Mengosongkan Sampah</h3>
            <p id="progressText">Menyiapkan proses...</p>
        </div>
    </div>
