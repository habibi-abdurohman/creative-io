    <div id="navbar-container"></div>

                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>

    <div class="side-panel-overlay" id="filterDrawerOverlay" onclick="if(event.target === this) closeFilterDrawer()">
    <div class="side-panel">
        <div class="side-panel-header">
            <h3 style="font-size: 18px; font-weight: 900;">Filter & Urutkan</h3>
            <button class="btn-close-sp" onclick="closeFilterDrawer()" title="Tutup Panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="side-panel-body">
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Urutkan Berdasarkan</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="btn-sp-action" id="sort-newest" onclick="setSort('newest')">🆕 Terakhir Diedit</button>
                    <button class="btn-sp-action" id="sort-oldest" onclick="setSort('oldest')">⏳ Edit Terlama</button>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Status Naskah</label>
                <div class="status-grid-2col">
                    <button class="filter-list-btn" id="status-all" onclick="setStatusFilter('all')">
                        <span class="member-name">Semua</span><span class="filter-badge" id="count-all">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-pinned" onclick="setStatusFilter('pinned')">
                        <span class="member-name">📌 Pinned</span><span class="filter-badge" id="count-pinned">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-draft" onclick="setStatusFilter('draft')">
                        <span class="member-name">📝 Draft</span><span class="filter-badge" id="count-draft">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-done" onclick="setStatusFilter('done')">
                        <span class="member-name">✅ Selesai</span><span class="filter-badge" id="count-done">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-restored" onclick="setStatusFilter('restored')" style="grid-column: 1 / -1;">
                        <span class="member-name">♻️ Dipulihkan</span><span class="filter-badge" id="count-restored">0</span>
                    </button>
                </div>
            </div>
            <div class="input-group">
                <label>Berdasarkan Kategori</label>
                <div class="category-grid-flex" id="drawerCategoryContainer"></div>
            </div>
        </div>
        <div class="side-panel-footer">
            <button class="btn-modal btn-cancel" onclick="resetFilters()" style="width: 100%; border-radius: 12px; font-weight: 800;">
                ✕ Bersihkan Semua Filter
            </button>
        </div>
    </div>
</div>
</body>
</html>
