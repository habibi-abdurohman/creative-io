    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">

    <link rel="stylesheet" href="../navbar/navbar.css">
    <meta name="theme-color" content="#f8fbff" id="themeColorMeta">
    <style>
        @import url(https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap);*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--bg-grad:#f8fbff;--sticky-bg:rgba(255, 255, 255, 0.75);--card-glass:rgba(255, 255, 255, 0.95);--card-solid:#ffffff;--card-tint:#f1f5f9;--border:#e2e8f0;--text-main:#0f172a;--text-muted:#64748b;--primary:#2563eb;--primary-grad:linear-gradient(135deg, #3b82f6, #2563eb);--primary-soft:rgba(37, 99, 235, 0.1);--success:#16a34a;--success-soft:rgba(22, 163, 74, 0.1);--danger:#ef4444;--danger-soft:rgba(239, 68, 68, 0.1);--warning:#f59e0b;--shadow-flat:0 10px 30px rgba(0, 0, 0, 0.04);--shadow-float:0 12px 40px rgba(0, 0, 0, 0.08);--radius-btn:14px;--radius-card:20px;--radius-pill:100px}body.dark{--bg-grad:#0f172a;--sticky-bg:rgba(15, 23, 42, 0.75);--card-glass:rgba(30, 41, 59, 0.95);--card-solid:#1e293b;--card-tint:#334155;--border:#334155;--text-main:#f8fafc;--text-muted:#94a3b8;--shadow-flat:0 10px 30px rgba(0, 0, 0, 0.2);--shadow-float:0 12px 40px rgba(0, 0, 0, 0.4)}body{font-family:Inter,system-ui,sans-serif;background:var(--bg-grad);color:var(--text-main);min-height:100vh;padding:68px 16px 100px;transition:background .3s}.bg-glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;opacity:.5;pointer-events:none}.bg-glow.one{width:340px;height:340px;background:rgba(59,130,246,.15);top:-50px;left:-100px}.bg-glow.two{width:320px;height:320px;background:rgba(96,165,250,.15);bottom:100px;right:-100px}.island-wrapper{position:sticky;top:68px;z-index:50;max-width:1200px;margin:0 auto 24px;pointer-events:none;display:flex;justify-content:center;opacity:0;transform:translateY(-10px);transition:opacity .4s,transform .4s}.island-wrapper.loaded{opacity:1;transform:translateY(0)}.control-island{pointer-events:auto;background:var(--sticky-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px;widt er-color:var(--primary);box-shadow:0 4px 12px rgba(37,99,235,.25)}.page-btn.disabled{opacity:.4;pointer-events:none}.page-dots{color:var(--text-muted);padding:0 4px}.fab{position:fixed;right:24px;bottom:24px;width:60px;height:60px;border:none;border-radius:20px;background:var(--primary-grad);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 12px 30px rgba(37,99,235,.35);z-index:100;align-items:center;justify-content:center}.fab:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 40px rgba(37,99,235,.45)}.btn-icon:active,.fab:active{transform:scale(.92)}.popup-overlay{position:fixed;inset:0;background:var(--bg-grad);z-index:99999;display:none;flex-direction:column}.btn-icon,.editor-header,.info-modal-overlay.active,.popup-overlay.active,.popup-overlay.reading-mode .fab-back,.suggest-dropdown.active{display:flex}.editor-header{justify-content:space-between;align-items:center;height:52px;padding:0 16px;background:rgba(255,255,255,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}body.dark .editor-header{background:rgba(15,23,42,.7);border-bottom:1px solid var(--border)}.btn-icon:hover,.dropdown-menu button:hover,.save-indicator{background:var(--card-tint)}.header-left,.header-right{display:flex;align-items:center;gap:8px}.save-indicator{font-size:11px;font-weight:800;color:var(--text-muted);padding:4px 10px;border-radius:10px;opacity:0;transition:.2s}.btn-icon,.input-title,body.dark .btn-icon{color:var(--text-main)}.save-indicator.show{opacity:1}.btn-icon{width:36px;height:36px;border:1px solid var(--border);border-radius:10px;background:var(--card-solid);align-items:center;justify-content:center;font-size:15px;cursor:pointer}.btn-icon.disabled{opacity:.35;pointer-events:none}.btn-icon.active-pin{background:var(--warning);border-color:var(--warning);color:#fff}.btn-icon.active-read{background:var(--primary);border-color:var(--primary);color:#fff}body.dark .btn-icon{border-colo olid var(--border);padding:8px 24px calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:flex-start;align-items:center;z-index:20}body.dark .editor-footer{background:rgba(15,23,42,.85)}.word-count{font-size:12px;font-weight:700;color:var(--text-muted);opacity:.8;display:flex;align-items:center;gap:8px}.dropdown-menu button,.fab-back{color:var(--text-main);transition:.2s;cursor:pointer}.word-count-divider{width:1px;height:12px;background:var(--text-muted);opacity:.4;display:inline-block}.dropdown-menu,.fab-back{background:var(--card-solid)}.dropdown-menu button.status-btn{opacity:.5;font-weight:600;filter:grayscale(1)}.dropdown-menu button.status-btn:hover{opacity:.8;filter:grayscale(.5)}.dropdown-menu button.status-btn.active-draft{opacity:1;font-weight:800;filter:grayscale(0)}.dropdown-menu button.status-btn.active-done{opacity:1;font-weight:800;color:var(--success);background:var(--success-soft);filter:grayscale(0)}.dropdown-wrap{position:relative}.dropdown-menu{position:absolute;top:44px;right:0;border:1px solid var(--border);border-radius:16px;padding:8px;flex-direction:column;gap:4px;min-width:200px;z-index:1000}.fab-back,.info-modal-overlay{position:fixed;z-index:100000;display:none}.dropdown-menu.active{display:flex!important}.dropdown-menu button{border:none;border-radius:10px}.fab-back{top:24px;left:24px;width:56px;height:56px;border:1px solid var(--border);border-radius:20px;box-shadow:var(--shadow-flat);align-items:center;justify-content:center}.btn-close-info,.info-card{width:100%;font-family:inherit}.fab-back:hover,.info-card{box-shadow:var(--shadow-float)}.fab-back:hover{transform:translateY(-4px)}.popup-overlay.reading-mode .category-wrapper,.popup-overlay.reading-mode .editor-footer,.popup-overlay.reading-mode .editor-header{display:none}.popup-overlay.reading-mode .editor-body{padding-top:100px;padding-bottom:150px;background-image:none}.popup-overlay.reading-mode .editor-container{max-width:700px}.popup-overlay.reading-mode .input-title{text-align:center;font-size:32px;margin-bottom:32px}.popup-overlay.reading-mode .input-content{font-size:18px;line-height:2;opacity:1}.info-modal-overlay{inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}.info-card{background:var(--card-solid);max-width:380px;border-radius:var(--radius-card);padding:32px;opacity:0;transition:.3s cubic-bezier(.4, 0, .2, 1)}.info-modal-overlay.active .info-card{transform:scale(1);opacity:1}.info-card h3{margin-bottom:24px;font-size:20px;font-weight:900;text-align:center}.info-row{display:flex;justify-content:space-between;margin-bottom:14px;font-size:14px;border-bottom:1px solid var(--border);padding-bottom:8px}.info-row:last-child{border:none}.info-label{color:var(--text-muted);font-weight:600}.btn-close-info,.info-value{color:var(--text-main);font-weight:800}.info-value{text-align:right;max-width:60%;word-break:break-word}.btn-close-info{padding:14px;margin-top:24px;border:none;background:var(--card-tint);border-radius:var(--radius-btn);cursor:pointer;transition:.2s}.btn-close-info:hover{filter:brightness(.95)}.btn-close-info:active{transform:scale(.96)}@media(max-width:600px){.list-container{grid-template-columns:1fr}.card{padding:16px 12px 12px 16px}.editor-container{padding:0 16px}.editor-footer{flex-direction:column;gap:16px;align-items:flex-start}.footer-actions{width:100%}.btn-action{flex:1;text-align:center}.word-count{width:100%;text-align:center;margin-bottom:4px}.fab-back{top:16px;left:16px;width:48px;height:48px}}

<body>
    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            <div class="island-scroll" id="islandScroll">
                <div class="search-module" id="searchContainer">
                    <button class="btn-island-icon search-btn" onclick="openSearch(event)" title="Cari Script">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <input type="text" id="searchInput" placeholder="Cari naskah atau kata kunci..." autocomplete="off" oninput="window.currentPage=1; renderList()">
                    <button class="btn-island-icon close-btn" id="closeSearchBtn" onclick="closeSearch(event)" title="Tutup Pencarian">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="filter-module" id="dynamicFilters">
                    </div>
            </div>
        </div>
    </div>
    <div class="grid-wrapper">
        <div class="list-container" id="listContainer">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>
    <button class="fab" onclick="openPopup()">+</button>
    <div class="popup-overlay" id="editorPopup">
        <button class="fab-back" id="btnExitReadingMode" onclick="toggleReadingMode()" title="Kembali ke Editor">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="editor-header">
            <div class="header-left">
                <button class="btn-icon" id="btnClosePopup" onclick="closePopup()" title="Tutup">✕</button>
                <button class="btn-icon disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                </button>
                <button class="btn-icon disabled" id="btnRedo" onclick="handleRedo()" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
                <div class="save-indicator" id="saveIndicator">Tersimpan</div>
            </div>
            <div class="header-right">
                <button class="btn-icon" onclick="togglePin()" id="btnPin" title="Sematkan">📌</button>
                <button class="btn-icon" onclick="toggleReadingMode()" id="btnReadingMode" title="Mode Fokus">👁️</button>
                <div class="dropdown-wrap">
                    <button class="btn-icon" onclick="window.toggleDropdown(event, 'actionMenu')">⋮</button>
                    <div class="dropdown-menu" id="actionMenu">
                        <button id="btnSetDraft" class="status-btn" onclick="window.setScriptStatus('draft')">📝 Jadikan Draft</button>
                        <button id="btnSetDone" class="status-btn" onclick="window.setScriptStatus('done')">✅ Tandai Selesai</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button onclick="window.showInfo()">ℹ️ Detail Info</button>
                        <button onclick="window.copyContent()">📋 Salin Teks</button>
                        <button onclick="window.exportTxt()">📄 Export .txt</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button onclick="window.softDeleteScript()" style="color: var(--danger);">🗑 Hapus ke Trash</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="editor-body">
            <div class="editor-container">
                <textarea id="inputTitle" class="input-title" placeholder="Judul Script..." autocomplete="off" spellcheck="false" rows="1" oninput="autoResizeTitle(); triggerAutoSave(); triggerHistorySave()" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('inputCategory').focus();}"></textarea>
                <div class="category-wrapper">
                    <input type="text" id="inputCategory" class="input-category" placeholder="Ketik Kategori (misal: YouTube, Tiktok)..." autocomplete="off" oninput="handleCategoryInput(); triggerHistorySave()" onfocus="showCategorySuggestions()">
                    <div class="suggest-dropdown" id="categorySuggestions"></div>
                </div>
                <textarea id="inputContent" class="input-content" placeholder="Mulai menulis narasi brilian Anda..." autocomplete="off" oninput="handleTyping(); autoResizeContent(); triggerHistorySave()"></textarea>
            </div>
        </div>
        <div class="editor-footer">
            <div class="word-count" id="wordCountDisplay">
                <span>0 Kata</span> <div class="word-count-divider"></div> <span>0 Karakter</span>
            </div>
        </div>
    </div>
    <div class="info-modal-overlay" id="infoModal">
        <div class="info-card">
            <h3>Informasi Script</h3>
            <div class="info-row"><span class="info-label">Judul</span> <span class="info-value" id="infoTitle">-</span></div>
            <div class="info-row"><span class="info-label">Kategori</span> <span class="info-value" id="infoCat">-</span></div>
            <div class="info-row"><span class="info-label">Status</span> <span class="info-value" id="infoStatus">-</span></div>
