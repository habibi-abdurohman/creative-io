<body>
    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            <div class="search-bar-modern">
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Cari naskah atau kata kunci..." autocomplete="off" oninput="window.currentPage=1; renderList()">
                <button class="btn-clear-filter" id="btnClearFilter" onclick="resetFilters()" style="display: none;" title="Hapus Filter">✕</button>
                <div class="island-divider-vertical"></div>
                <button class="btn-island-action" onclick="openFilterDrawer()" title="Filter & Urutkan">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="6" r="3"></circle><line x1="3" y1="6" x2="11" y2="6"></line><line x1="17" y1="6" x2="21" y2="6"></line><circle cx="8" cy="12" r="3"></circle><line x1="3" y1="12" x2="5" y2="12"></line><line x1="11" y1="12" x2="21" y2="12"></line><circle cx="16" cy="18" r="3"></circle><line x1="3" y1="18" x2="13" y2="18"></line><line x1="19" y1="18" x2="21" y2="18"></line></svg>
                    <div class="filter-dot" id="filterBadge"></div>
                </button>
            </div>
        </div>
    </div>
    <div class="grid-wrapper">
        <div class="list-container" id="listContainer">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>
    <button class="fab" onclick="openPopup()">+</button>
    <div class="popup-overlay" id="editorPopup">
        <button class="fab-back" id="btnExitReadingMode" onclick="toggleReadingMode()" title="Kembali ke Editor">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="editor-header">
            <div class="header-left">
                <button class="btn-icon" id="btnClosePopup" onclick="closePopup()" title="Tutup">✕</button>
                <button class="btn-icon disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>

    <div class="side-panel-overlay" id="filterDrawerOverlay" onclick="if(event.target === this) closeFilterDrawer()">
    <div class="side-panel">
        <div class="side-panel-header">
            <h3 style="font-size: 18px; font-weight: 900;">Filter & Urutkan</h3>
            <button class="btn-close-sp" onclick="closeFilterDrawer()" title="Tutup Panel">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="side-panel-body">
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Urutkan Berdasarkan</label>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                    <button class="btn-sp-action" id="sort-newest" onclick="setSort('newest')">🆕 Terakhir Diedit</button>
                    <button class="btn-sp-action" id="sort-oldest" onclick="setSort('oldest')">⏳ Edit Terlama</button>
                </div>
            </div>
            <div class="input-group" style="margin-bottom: 24px;">
                <label>Status Naskah</label>
                <div class="status-grid-2col">
                    <button class="filter-list-btn" id="status-all" onclick="setStatusFilter('all')">
                        <span class="member-name">Semua</span><span class="filter-badge" id="count-all">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-pinned" onclick="setStatusFilter('pinned')">
                        <span class="member-name">📌 Pinned</span><span class="filter-badge" id="count-pinned">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-draft" onclick="setStatusFilter('draft')">
                        <span class="member-name">📝 Draft</span><span class="filter-badge" id="count-draft">0</span>
                    </button>
                    <button class="filter-list-btn" id="status-done" onclick="setStatusFilter('done')">
                        <span class="member-name">✅ Selesai</span><span class="filter-badge" id="count-done">0</span>
                    </button>
                </div>
            </div>
            <div class="input-group">
                <label>Berdasarkan Kategori</label>
                <div class="category-grid-flex" id="drawerCategoryContainer"></div>
            </div>
        </div>
        <div class="side-panel-footer">
            <button class="btn-modal btn-cancel" onclick="resetFilters()" style="width: 100%; border-radius: 12px; font-weight: 800;">
                ✕ Bersihkan Semua Filter
            </button>
        </div>
    </div>
</div>
</body>
</html>
