<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Script Writer - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">
    
    <link rel="manifest" href="../manifest.json">
    <link rel="stylesheet" href="../navbar/navbar.css">
    <meta name="theme-color" content="#f8fbff" id="themeColorMeta">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-grad: #f8fbff; 
            --sticky-bg: rgba(255, 255, 255, 0.75);
            --card-glass: rgba(255, 255, 255, 0.95);
            --card-solid: #ffffff;
            --card-tint: #f1f5f9;
            --border: #e2e8f0; 
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --primary: #2563eb; 
            --primary-grad: linear-gradient(135deg, #3b82f6, #2563eb); 
            --primary-soft: rgba(37, 99, 235, 0.1); 
            --success: #16a34a; 
            --success-soft: rgba(22, 163, 74, 0.1); 
            --danger: #ef4444; 
            --danger-soft: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b; 
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.04); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius-btn: 14px; 
            --radius-card: 20px; 
            --radius-pill: 100px;
        }
        
        body.dark { 
            --bg-grad: #0f172a; 
            --sticky-bg: rgba(15, 23, 42, 0.75);
            --card-glass: rgba(30, 41, 59, 0.95);
            --card-solid: #1e293b; 
            --card-tint: #334155; 
            --border: #334155; 
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.2); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-grad); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 68px 16px 100px 16px; 
            transition: background 0.3s ease;
        }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }

        .island-wrapper {
            position: sticky; 
            top: 68px; 
            z-index: 50; 
            max-width: 1200px; 
            margin: 0 auto 24px auto;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .island-wrapper.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .control-island {
            pointer-events: auto; 
            background: var(--sticky-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            border-radius: var(--radius-pill); 
            padding: 6px; 
            width: max-content; 
            max-width: 100%; 
            box-shadow: var(--shadow-float); 
            overflow: hidden; 
            -webkit-mask-image: -webkit-radial-gradient(white, black); 
            transform: translateZ(0); 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-island.searching .island-scroll { gap: 0; }

        .island-scroll {
            display: flex; 
            align-items: center; 
            gap: 6px; 
            width: 100%; 
            overflow-x: auto; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
            cursor: grab;
            border-radius: 100px;
        }
        .island-scroll:active { cursor: grabbing; }
        .island-scroll::-webkit-scrollbar { display: none; }

        .search-module { 
            display: flex; 
            align-items: center; 
            background: var(--card-solid); 
            border: 1px solid var(--border);
            border-radius: var(--radius-pill); 
            height: 44px; 
            width: 44px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            flex-shrink: 0;
            overflow: hidden;
        }

        .control-island.searching .search-module { 
            width: 100%; 
            flex: 1; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px var(--primary-soft); 
        }
        
        .btn-island-icon { 
            flex-shrink: 0; width: 44px; height: 44px; 
            background: transparent; border: none; font-size: 16px; 
            cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .control-island.searching .btn-island-icon.search-btn { color: var(--primary); pointer-events: none; }
        
        .btn-island-icon.close-btn { opacity: 0; pointer-events: none; width: 0; }
        .control-island.searching .btn-island-icon.close-btn { opacity: 1; pointer-events: auto; width: 44px; }
        .btn-island-icon.close-btn:hover { color: var(--danger); }
        
        .search-module input { 
            flex: 1; border: none; outline: none; background: transparent; 
            font-size: 14px; font-weight: 600; color: var(--text-main); 
            padding: 0; opacity: 0; pointer-events: none; width: 0;
            transition: opacity 0.2s 0.1s; font-family: inherit;
        }
        .control-island.searching .search-module input { opacity: 1; pointer-events: auto; width: auto; padding: 0 4px; }

        .filter-module {
            display: flex; align-items: center; gap: 6px; 
            flex-shrink: 0; 
            margin: 0; padding: 0; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .control-island.searching .filter-module { 
            max-width: 0; opacity: 0; margin: 0; padding: 0; gap: 0; pointer-events: none; overflow: hidden;
        }

        .filter-btn { 
            height: 38px;
            padding: 0 16px; 
            border-radius: 100px;
            display: flex; align-items: center; gap: 8px;
            background: transparent; border: none; 
            font-size: 13px; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: all 0.2s; white-space: nowrap; outline: none; flex-shrink: 0;
        }
        .filter-btn:hover { background: var(--card-tint); color: var(--text-main); }
        .filter-btn:active { transform: scale(0.95); }
        
        .filter-btn.active { background: var(--primary) !important; color: white !important; box-shadow: none !important; }
        
        .f-count {
            background: var(--border); color: var(--text-main);
            padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 800;
            transition: 0.2s;
        }
        .filter-btn.active .f-count { background: rgba(255,255,255,0.25); color: white; }
        
        .island-divider { flex-shrink: 0; width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

        .grid-wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }

        .list-container { 
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media(max-width: 1024px) { .list-container { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width: 600px) { .list-container { grid-template-columns: 1fr; } }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; margin-bottom: 12px; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); cursor: pointer; transition: 0.2s; }
        .empty-state:hover { background: var(--card-tint); transform: scale(0.99); }
        .empty-state-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.8; }
        .empty-state-text { font-size: 14px; font-weight: 600; color: var(--text-muted); line-height: 1.6; }
        
        .card { 
            display: flex; flex-direction: column; height: 100%; 
            background: var(--card-glass); backdrop-filter: blur(12px); border: 1px solid var(--border); 
            border-radius: var(--radius-card); padding: 20px; 
            box-shadow: var(--shadow-flat); transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s; 
            cursor: pointer; 
        }
        .card:hover { transform: translateY(-4px); border-color: var(--primary-soft); box-shadow: var(--shadow-float); }
        .card:active { transform: scale(0.98); }
        
        .card.pinned { border-left: 4px solid var(--warning); border-width: 1px 1px 1px 4px; }
        .card.completed { opacity: 0.6; }
        .card.completed .card-title { text-decoration: line-through; }
        
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        
        .card-title { 
            font-size: 16px; font-weight: 800; line-height: 1.4; color: var(--text-main); 
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
            word-break: break-word;
        }
        
        .card-preview { 
            font-size: 13px; color: var(--text-muted); 
            line-height: 24px; height: 48px; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; 
            margin-bottom: 16px; word-break: break-word;
        }
        
        .card-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: auto; border-top: 1px dashed var(--border); padding-top: 12px; }
        
        .badges { display: flex; gap: 6px; flex-wrap: wrap; }
        .badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700; background: var(--card-tint); color: var(--text-muted); border: 1px solid var(--border); }
        .badge.ch { background: var(--primary-soft); color: var(--primary); border: none; }
        .badge.done { background: var(--success-soft); color: var(--success); border: none; }
        
        .card-actions { display: flex; gap: 4px; }
        .btn-icon-small { 
            width: 32px; height: 32px; border: none; border-radius: 10px; 
            background: transparent; color: var(--text-muted); 
            display: flex; align-items: center; justify-content: center; font-size: 14px; 
            cursor: pointer; transition: 0.2s; 
        }
        .btn-icon-small:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-icon-small:active { transform: scale(0.9); }

        .pagination-container {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 32px; flex-wrap: wrap; grid-column: 1 / -1;
        }
        .page-btn {
            min-width: 40px; height: 40px; padding: 0 12px;
            border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--card-glass);
            color: var(--text-main); font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s;
            font-family: inherit;
        }
        .page-btn:hover:not(.disabled):not(.active) { background: var(--card-tint); transform: translateY(-2px); }
        .page-btn:active:not(.disabled) { transform: scale(0.95); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .page-dots { color: var(--text-muted); font-weight: 700; padding: 0 4px; }

        .fab { position: fixed; right: 24px; bottom: 24px; width: 60px; height: 60px; border: none; border-radius: 20px; background: var(--primary-grad); color: white; font-size: 28px; cursor: pointer; box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35); z-index: 100; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .fab:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 16px 40px rgba(37, 99, 235, 0.45); }
        .fab:active { transform: scale(0.92); }
        
        .popup-overlay { position: fixed; inset: 0; background: var(--bg-grad); z-index: 99999; display: none; flex-direction: column; }
        .popup-overlay.active { display: flex; }
        
        .editor-header { 
            display: flex; justify-content: space-between; align-items: center; 
            height: 52px; padding: 0 16px; 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); z-index: 10; flex-shrink: 0; 
        }
        body.dark .editor-header { background: rgba(15, 23, 42, 0.7); border-bottom: 1px solid var(--border); }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 8px; }
        .save-indicator { font-size: 11px; font-weight: 800; color: var(--text-muted); background: var(--card-tint); padding: 4px 10px; border-radius: 10px; opacity: 0; transition: 0.2s; }
        .save-indicator.show { opacity: 1; }
        
        .btn-icon { 
            width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 10px; 
            background: var(--card-solid); color: var(--text-main); 
            display: flex; align-items: center; justify-content: center; font-size: 15px; 
            cursor: pointer; transition: all 0.2s; 
        }
        .btn-icon:hover { background: var(--card-tint); }
        .btn-icon:active { transform: scale(0.92); }
        .btn-icon.disabled { opacity: 0.35; pointer-events: none; }
        .btn-icon.active-pin { background: var(--warning); border-color: var(--warning); color: white; }
        .btn-icon.active-read { background: var(--primary); border-color: var(--primary); color: white; }
        body.dark .btn-icon { border-color: var(--border); background: var(--card-solid); color: var(--text-main); }
        
        .editor-body { 
            flex: 1; overflow-y: auto; padding: 32px 0 150px; scroll-padding-bottom: 120px; 
            width: 100%; transition: padding 0.3s; 
            background-size: 100% 32px; background-position: 0 8px; background-attachment: local; 
            scrollbar-width: none; -ms-overflow-style: none; 
        }
        .editor-body::-webkit-scrollbar { display: none; }

        .editor-container { max-width: 1000px; width: 100%; margin: 0 auto; position: relative; padding: 0 24px; display: block; }
        
        .input-title { 
            font-family: inherit; width: 100%; border: none; outline: none; background: transparent; 
            font-size: 32px; font-weight: 900; color: var(--text-main); margin-bottom: 8px; 
            letter-spacing: -0.5px; transition: text-align 0.3s; resize: none; overflow: hidden; line-height: 1.3;
        }
        .input-title::placeholder { color: var(--text-muted); opacity: 0.4; }
        
        .category-wrapper { position: relative; width: 100%; margin-bottom: 32px; }
        .input-category { width: 100%; border: none; outline: none; background: transparent; font-size: 14px; font-weight: 800; color: var(--primary); font-family: inherit; }
        .input-category::placeholder { color: var(--text-muted); opacity: 0.5; }
        
        .suggest-dropdown { position: absolute; top: 100%; left: 0; background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 6px; box-shadow: var(--shadow-float); z-index: 100; min-width: 220px; max-height: 200px; overflow-y: auto; display: none; flex-direction: column; gap: 4px; margin-top: 8px; }
        .suggest-dropdown.active { display: flex; }
        .suggest-item { padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--text-main); cursor: pointer; transition: 0.2s; text-align: left; background: transparent; border: none; font-family: inherit; }
        .suggest-item:hover { background: var(--primary-soft); color: var(--primary); }

        .input-content { 
            width: 100%; min-height: 50vh; border: none; outline: none; resize: none; overflow: hidden; 
            background: transparent; font-size: 16px; line-height: 32px; color: var(--text-main); 
            font-family: inherit; opacity: 0.9;
        }
        .input-content::placeholder { color: var(--text-muted); opacity: 0.4; }
        
        .editor-footer { 
            width: 100%; flex-shrink: 0; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); 
            padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
        }
        body.dark .editor-footer { background: rgba(15, 23, 42, 0.85); }
        .word-count { font-size: 13px; font-weight: 700; color: var(--text-muted); }
        .footer-actions { display: flex; gap: 12px; }
        .btn-action { padding: 14px 24px; border: none; border-radius: var(--radius-btn); font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-draft { background: var(--card-solid); border: 1px solid var(--border); color: var(--text-main); }
        .btn-draft:hover { background: var(--card-tint); transform: translateY(-2px); }
        .btn-draft:active { transform: scale(0.95); }
        .btn-done { background: var(--primary-grad); color: white; box-shadow: 0 8px 20px rgba(37, 99, 235, 0.25); }
        .btn-done:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37, 99, 235, 0.35); }
        .btn-done:active { transform: scale(0.95); }
        
        .dropdown-wrap { position: relative; }
        .dropdown-menu { position: absolute; top: 44px; right: 0; background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 8px; display: none; flex-direction: column; gap: 4px; min-width: 200px; box-shadow: var(--shadow-float); z-index: 1000; }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu button { background: transparent; border: none; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--text-main); text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .dropdown-menu button:hover { background: var(--card-tint); }

        .fab-back {
            position: fixed; top: 24px; left: 24px; width: 56px; height: 56px; border: 1px solid var(--border); border-radius: 20px;
            background: var(--card-solid); color: var(--text-main); cursor: pointer; box-shadow: var(--shadow-flat);
            z-index: 100000; display: none; align-items: center; justify-content: center; transition: 0.2s ease;
        }
        .fab-back:hover { transform: translateY(-4px); box-shadow: var(--shadow-float); }
        .fab-back:active { transform: scale(0.9); }
        
        .popup-overlay.reading-mode .fab-back { display: flex; }
        .popup-overlay.reading-mode .editor-header, .popup-overlay.reading-mode .category-wrapper, .popup-overlay.reading-mode .editor-footer { display: none; }
        .popup-overlay.reading-mode .editor-body { padding-top: 100px; padding-bottom: 150px; background-image: none; }
        .popup-overlay.reading-mode .editor-container { max-width: 700px; }
        .popup-overlay.reading-mode .input-title { text-align: center; font-size: 32px; margin-bottom: 32px; }
        .popup-overlay.reading-mode .input-content { font-size: 18px; line-height: 2; opacity: 1; }

        .info-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .info-modal-overlay.active { display: flex; }
        .info-card { background: var(--card-solid); width: 100%; max-width: 380px; border-radius: var(--radius-card); padding: 32px; box-shadow: var(--shadow-float); font-family: inherit; transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .info-modal-overlay.active .info-card { transform: scale(1); opacity: 1; }
        .info-card h3 { margin-bottom: 24px; font-size: 20px; font-weight: 900; text-align: center; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px;}
        .info-row:last-child { border: none; }
        .info-label { color: var(--text-muted); font-weight: 600; }
        .info-value { font-weight: 800; color: var(--text-main); text-align: right; max-width: 60%; word-break: break-word;}
        .btn-close-info { width: 100%; padding: 14px; margin-top: 24px; border: none; background: var(--card-tint); color: var(--text-main); font-weight: 800; border-radius: var(--radius-btn); cursor: pointer; transition: 0.2s; font-family: inherit; }
        .btn-close-info:hover { filter: brightness(0.95); }
        .btn-close-info:active { transform: scale(0.96); }
        
        @media(max-width: 600px) { 
            .card { padding: 16px 12px 12px 16px; }
            .editor-container { padding: 0 16px; }
            .editor-footer { flex-direction: column; gap: 16px; align-items: flex-start; } 
            .footer-actions { width: 100%; } 
            .btn-action { flex: 1; text-align: center; } 
            .word-count { width: 100%; text-align: center; margin-bottom: 4px;} 
            .fab-back { top: 16px; left: 16px; width: 48px; height: 48px; }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            
            <div class="island-scroll" id="islandScroll">
                
                <div class="search-module" id="searchContainer">
                    <button class="btn-island-icon search-btn" onclick="openSearch(event)" title="Cari Script">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <input type="text" id="searchInput" placeholder="Cari naskah atau kata kunci..." autocomplete="off" oninput="window.currentPage=1; renderList()">
                    <button class="btn-island-icon close-btn" id="closeSearchBtn" onclick="closeSearch(event)" title="Tutup Pencarian">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="filter-module" id="dynamicFilters">
                    </div>

            </div>

        </div>
    </div>

    <div class="grid-wrapper">
        <div class="list-container" id="listContainer">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>
