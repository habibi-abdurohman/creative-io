    <style>
        @import url(https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap);*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}:root{--bg-grad:#f8fbff;--sticky-bg:rgba(255, 255, 255, 0.75);--card-glass:rgba(255, 255, 255, 0.95);--card-solid:#ffffff;--card-tint:#f1f5f9;--border:#e2e8f0;--text-main:#0f172a;--text-muted:#64748b;--primary:#2563eb;--primary-grad:linear-gradient(135deg, #3b82f6, #2563eb);--primary-soft:rgba(37, 99, 235, 0.1);--success:#16a34a;--success-soft:rgba(22, 163, 74, 0.1);--danger:#ef4444;--danger-soft:rgba(239, 68, 68, 0.1);--warning:#f59e0b;--shadow-flat:0 10px 30px rgba(0, 0, 0, 0.04);--shadow-float:0 12px 40px rgba(0, 0, 0, 0.08);--radius-btn:14px;--radius-card:20px;--radius-pill:100px}body.dark{--bg-grad:#0f172a;--sticky-bg:rgba(15, 23, 42, 0.75);--card-glass:rgba(30, 41, 59, 0.95);--card-solid:#1e293b;--card-tint:#334155;--border:#334155;--text-main:#f8fafc;--text-muted:#94a3b8;--shadow-flat:0 10px 30px rgba(0, 0, 0, 0.2);--shadow-float:0 12px 40px rgba(0, 0, 0, 0.4)}body{font-family:Inter,system-ui,sans-serif;background:var(--bg-grad);color:var(--text-main);min-height:100vh;padding:68px 16px 100px;transition:background .3s}.bg-glow{position:fixed;border-radius:50%;filter:blur(90px);z-index:0;opacity:.5;pointer-events:none}.bg-glow.one{width:340px;height:340px;background:rgba(59,130,246,.15);top:-50px;left:-100px}.bg-glow.two{width:320px;height:320px;background:rgba(96,165,250,.15);bottom:100px;right:-100px}.island-wrapper{position:sticky;top:68px;z-index:50;max-width:1200px;margin:0 auto 24px;pointer-events:none;display:flex;justify-content:center;opacity:0;transform:translateY(-10px);transition:opacity .4s,transform .4s}.island-wrapper.loaded{opacity:1;transform:translateY(0)}.control-island{pointer-events:auto;background:var(--sticky-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius-pill);padding:6px;widt ilter-module{max-width:0;opacity:0;margin:0;padding:0;gap:0;pointer-events:none;overflow:hidden}.filter-btn{height:38px;padding:0 16px;border-radius:100px;align-items:center;gap:8px;background:0 0;border:none;font-size:13px;font-weight:700;transition:.2s;white-space:nowrap;outline:0;flex-shrink:0}.f-count,.island-divider{background:var(--border)}.filter-btn:hover{background:var(--card-tint);color:var(--text-main)}.filter-btn.active{background:var(--primary)!important;color:#fff!important;box-shadow:none!important}.f-count{color:var(--text-main);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:800;transition:.2s}.filter-btn.active .f-count{background:rgba(255,255,255,.25);color:#fff}.island-divider{flex-shrink:0;width:1px;height:20px;margin:0 2px}.card,.empty-state{background:var(--card-glass);cursor:pointer}.grid-wrapper{position:relative;z-index:2;max-width:1200px;margin:0 auto}.list-container{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;width:100%}@media(max-width:1024px){.list-container{grid-template-columns:repeat(2,1fr)}}@keyframes spin{100%{transform:rotate(360deg)}}.spin{animation:1s linear infinite spin;margin-bottom:12px}.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;border:1px dashed var(--border);border-radius:var(--radius-card);transition:.2s}.empty-state:hover{background:var(--card-tint);transform:scale(.99)}.empty-state-icon{font-size:42px;margin-bottom:12px;opacity:.8}.empty-state-text{font-size:14px;font-weight:600;color:var(--text-muted);line-height:1.6}.card{display:flex;flex-direction:column;height:100%;backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--radius-card);padding:16px;box-shadow:var(--shadow-flat);transition:transform .2s,box-shadow .2s,border-color .2s}.card:hover{transform:translateY(-4px);border-color:var(--primary-soft);box-shadow:var(--shadow-float)}.card:active{transform:scale(.98)}.card.pinned{border-left:4px solid var(--warning);border-width:1px 1px 1px 4px}.card.completed{opacity:.6}.card.completed .card-title{text-decoration:line-through}.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}.card-preview,.card-title{display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}.card-title{font-size:16px;font-weight:800;color:var(--text-main);line-height:22px;height:22px;-webkit-line-clamp:1}.badge,.page-btn,.page-dots{font-weight:700}.badge,.btn-icon-small,.card-preview{color:var(--text-muted)}.card-preview{font-size:13px;line-height:20px;height:40px;margin-bottom:12px;-webkit-line-clamp:2}.card-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:auto;border-top:none;padding-top:0}.badges{display:flex;gap:6px;flex-wrap:wrap}.badge{padding:4px 10px;border-radius:8px;font-size:11px;background:var(--card-tint);border:1px solid var(--border)}.btn-icon-small,.page-btn{font-size:14px;display:flex;cursor:pointer;transition:.2s}.badge.ch{background:var(--primary-soft);color:var(--primary);border:none}.badge.done{background:var(--success-soft);color:var(--success);border:none}.card-actions{display:flex;gap:4px}.btn-icon-small{width:32px;height:32px;border:none;border-radius:10px;background:0 0;align-items:center;justify-content:center}.btn-icon-small:hover{background:rgba(239,68,68,.1);color:var(--danger)}.btn-icon-small:active,.fab-back:active{transform:scale(.9)}.pagination-container{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:32px;flex-wrap:wrap;grid-column:1/-1}.page-btn{min-width:40px;height:40px;padding:0 12px;border-radius:var(--radius-btn);border:1px solid var(--border);background:var(--card-glass);color:var(--text-main);justify-content:center;align-items:center;font-family:inherit}.btn-draft:hover,.page-btn:hover:not(.disabled):not(.active){background:var(--card-tint);transform:translateY(-2px)}.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 4px 12px rgba(37,99,235,.25)}.page-btn.disabled{opacity:.4;pointer-events:none}.page-dots{color:var(--text-muted);padding:0 4px}.fab{position:fixed;right:24px;bottom:24px;width:60px;height:60px;border:none;border-radius:20px;background:var(--primary-grad);color:#fff;font-size:28px;cursor:pointer;box-shadow:0 12px 30px rgba(37,99,235,.35);z-index:100;display:flex;align-items:center;justify-content:center;transition:.2s}.fab:hover{transform:translateY(-4px) scale(1.02);box-shadow:0 16px 40px rgba(37,99,235,.45)}.btn-icon:active,.fab:active{transform:scale(.92)}.popup-overlay{position:fixed;inset:0;background:var(--bg-grad);z-index:99999;display:none;flex-direction:column}.btn-icon,.dropdown-menu.active,.editor-header,.info-modal-overlay.active,.popup-overlay.active,.popup-overlay.reading-mode .fab-back,.suggest-dropdown.active{display:flex}.editor-header{justify-content:space-between;align-items:center;height:52px;padding:0 16px;background:rgba(255,255,255,.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);z-index:10;flex-shrink:0}body.dark .editor-header{background:rgba(15,23,42,.7);border-bottom:1px solid var(--border)}.btn-icon:hover,.dropdown-menu button:hover,.save-indicator{background:var(--card-tint)}.header-left,.header-right{display:flex;align-items:center;gap:8px}.save-indicator{font-size:11px;font-weight:800;color:var(--text-muted);padding:4px 10px;border-radius:10px;opacity:0;transition:.2s}.btn-icon,.input-title,body.dark .btn-icon{color:var(--text-main)}.save-indicator.show{opacity:1}.btn-icon{width:36px;height:36px;border:1px solid var(--border);border-radius:10px;background:var(--card-solid);align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:.2s}.btn-icon.disabled{opacity:.35;pointer-events:none}.btn-icon.active-pin{background:var(--warning);border-color:var(--warning);color:#fff}.btn-icon.active-read{background:var(--primary);border-color:var(--primary);color:#fff}body.dark .btn-icon{border-color:var(--border);background:var(--card-solid)}.editor-body{flex:1;overflow-y:auto;padding:32px 0 150px;scroll-padding-bottom:120px;width:100%;transition:padding .3s;background-size:100% 32px;background-position:0 8px;background-attachment:local;scrollbar-width:none;-ms-overflow-style:none}.input-category,.input-title{border:none;background:0 0;font-family:inherit;outline:0;width:100%}.editor-body::-webkit-scrollbar{display:none}.editor-container{max-width:1000px;width:100%;margin:0 auto;position:relative;padding:0 24px;display:block}.input-title{font-size:32px;font-weight:900;margin-bottom:8px;letter-spacing:-.5px;transition:text-align .3s;resize:none;overflow:hidden;line-height:1.3}.btn-action,.suggest-item{cursor:pointer;transition:.2s}.input-title::placeholder{color:var(--text-muted);opacity:.4}.category-wrapper{position:relative;width:100%;margin-bottom:32px}.input-category{font-size:14px;font-weight:800;color:var(--primary)}.input-category::placeholder{color:var(--text-muted);opacity:.5}.suggest-dropdown{position:absolute;top:100%;left:0;background:var(--card-solid);border:1px solid var(--border);border-radius:16px;padding:6px;box-shadow:var(--shadow-float);z-index:100;min-width:220px;max-height:200px;overflow-y:auto;display:none;flex-direction:column;gap:4px;margin-top:8px}.dropdown-menu button,.suggest-item{background:0 0;padding:12px 16px;font-weight:700;text-align:left;font-family:inherit}.suggest-item{border-radius:10px;font-size:13px;color:var(--text-main);border:none}.suggest-item:hover{background:var(--primary-soft);color:var(--primary)}.input-content{width:100%;min-height:50vh;border:none;outline:0;resize:none;overflow:hidden;background:0 0;font-size:16px;line-height:32px;color:var(--text-main);font-family:inherit;opacity:.9}.input-content::placeholder{color:var(--text-muted);opacity:.4}.editor-footer{width:100%;flex-shrink:0;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:16px height:2;opacity:1}.info-modal-overlay{inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px}.info-card{background:var(--card-solid);max-width:380px;border-radius:var(--radius-card);padding:32px;opacity:0;transition:.3s cubic-bezier(.4, 0, .2, 1)}.info-modal-overlay.active .info-card{transform:scale(1);opacity:1}.info-card h3{margin-bottom:24px;font-size:20px;font-weight:900;text-align:center}.info-row{display:flex;justify-content:space-between;margin-bottom:14px;font-size:14px;border-bottom:1px solid var(--border);padding-bottom:8px}.info-row:last-child{border:none}.info-label{color:var(--text-muted);font-weight:600}.btn-close-info,.info-value{color:var(--text-main);font-weight:800}.info-value{text-align:right;max-width:60%;word-break:break-word}.btn-close-info{padding:14px;margin-top:24px;border:none;background:var(--card-tint);border-radius:var(--radius-btn);cursor:pointer;transition:.2s}.btn-close-info:hover{filter:brightness(.95)}.btn-close-info:active{transform:scale(.96)}@media(max-width:600px){.list-container{grid-template-columns:1fr}.card{padding:16px 12px 12px 16px}.editor-container{padding:0 16px}.editor-footer{flex-direction:column;gap:16px;align-items:flex-start}.footer-actions{width:100%}.btn-action{flex:1;text-align:center}.word-count{width:100%;text-align:center;margin-bottom:4px}.fab-back{top:16px;left:16px;width:48px;height:48px}}

<body>
    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            <div class="island-scroll" id="islandScroll">
                <div class="search-module" id="searchContainer">
                    <button class="btn-island-icon search-btn" onclick="openSearch(event)" title="Cari Script">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <input type="text" id="searchInput" placeholder="Cari naskah atau kata kunci..." autocomplete="off" oninput="window.currentPage=1; renderList()">
                    <button class="btn-island-icon close-btn" id="closeSearchBtn" onclick="closeSearch(event)" title="Tutup Pencarian">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                <div class="filter-module" id="dynamicFilters">
                    </div>
            </div>

        </div>
    </div>
    <div class="grid-wrapper">
        <div class="list-container" id="listContainer">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>
    <button class="fab" onclick="openPopup()">+</button>
    <div class="popup-overlay" id="editorPopup">
        <button class="fab-back" id="btnExitReadingMode" onclick="toggleReadingMode()" title="Kembali ke Editor">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </button>
        <div class="editor-header">
            <div class="header-left">
                <button class="btn-icon" id="btnClosePopup" onclick="closePopup()" title="Tutup">✕</button>
                <button class="btn-icon disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                </button>
                <button class="btn-icon disabled" id="btnRedo" onclick="handleRedo()" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
                <div class="save-indicator" id="saveIndicator">Tersimpan</div>
            </div>
            <div class="header-right">
                <button class="btn-icon" onclick="togglePin()" id="btnPin" title="Sematkan">📌</button>
                <button class="btn-icon" onclick="toggleReadingMode()" id="btnReadingMode" title="Mode Fokus">👁️</button>
                <div class="dropdown-wrap">
                    <button class="btn-icon" onclick="toggleDropdown(event, 'actionMenu')">⋮</button>
                    <div class="dropdown-menu" id="actionMenu">
                        <button onclick="showInfo()">ℹ️ Detail Info</button>
                        <button onclick="copyContent()">📋 Salin Teks</button>
                        <button onclick="exportTxt()">📄 Export .txt</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button onclick="softDeleteScript()" style="color: var(--danger);">🗑 Hapus ke Trash</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="editor-body">
            <div class="editor-container">
                <textarea id="inputTitle" class="input-title" placeholder="Judul Script..." autocomplete="off" spellcheck="false" rows="1" oninput="autoResizeTitle(); triggerAutoSave(); triggerHistorySave()" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('inputCategory').focus();}"></textarea>
                <div class="category-wrapper">
                    <input type="text" id="inputCategory" class="input-category" placeholder="Ketik Kategori (misal: YouTube, Tiktok)..." autocomplete="off" oninput="handleCategoryInput(); triggerHistorySave()" onfocus="showCategorySuggestions()">
                    <div class="suggest-dropdown" id="categorySuggestions"></div>
                </div>
                <textarea id="inputContent" class="input-content" placeholder="Mulai menulis narasi brilian Anda..." autocomplete="off" oninput="handleTyping(); autoResizeContent(); triggerHistorySave()"></textarea>
            </div>
        </div>
        <div class="editor-footer">
            <div class="word-count" id="wordCountDisplay">0 Kata • 0 Karakter</div>
            <div class="footer-actions">
                <button class="btn-action btn-draft" onclick="saveScript('draft')">Simpan Draft</button>
                <button class="btn-action btn-done" onclick="saveScript('done')">Tandai Selesai</button>
            </div>
        </div>
    </div>
    <div class="info-modal-overlay" id="infoModal">
        <div class="info-card">
            <h3>Informasi Script</h3>
            <div class="info-row"><span class="info-label">Judul</span> <span class="info-value" id="infoTitle">-</span></div>
            <div class="info-row"><span class="info-label">Kategori</span> <span class="info-value" id="infoCat">-</span></div>
            <div class="info-row"><span class="info-label">Status</span> <span class="info-value" id="infoStatus">-</span></div>
            <div class="info-row"><span class="info-label">Jumlah Kata</span> <span class="info-value" id="infoWords">0</span></div>
            <div class="info-row"><span class="info-label">Karakter</span> <span class="info-value" id="infoChars">0</span></div>
            <div class="info-row"><span class="info-label">Dibuat</span> <span class="info-value" id="infoCreated">-</span></div>
