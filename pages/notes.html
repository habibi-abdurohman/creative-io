<body>
    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            <div class="search-bar-modern">
                <div class="search-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                </div>
                <input type="text" id="searchInput" placeholder="Cari catatan..." autocomplete="off" oninput="window.currentPage=1; renderNotes()">
                <button class="btn-clear-filter" id="btnClearFilter" onclick="resetFilters()" style="display: none;" title="Hapus Filter">✕</button>
                <div class="island-divider-vertical"></div>
                <button class="btn-island-action" onclick="openFilterDrawer()" title="Filter & Urutkan">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="14" cy="6" r="3"></circle><line x1="3" y1="6" x2="11" y2="6"></line><line x1="17" y1="6" x2="21" y2="6"></line><circle cx="8" cy="12" r="3"></circle><line x1="3" y1="12" x2="5" y2="12"></line><line x1="11" y1="12" x2="21" y2="12"></line><circle cx="16" cy="18" r="3"></circle><line x1="3" y1="18" x2="13" y2="18"></line><line x1="19" y1="18" x2="21" y2="18"></line></svg>
                    <div class="filter-dot" id="filterBadge"></div>
                </button>
            </div>
        </div>
    </div>
    <div class="grid-wrapper">
        <div class="notes-list" id="notesList">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>
    <button class="fab" onclick="openEditor()">+</button>
    <div class="editor" id="editor">
        <div class="editor-header">
            <div class="editor-left">
                <button class="icon-btn" onclick="closeEditor()">✕</button>
                <button class="icon-btn disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                </button>
                <button class="icon-btn disabled" id="btnRedo" onclick="handleRedo()" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
                <div class="auto-save" id="autoSaveStatus">Tersimpan ✓</div>
            </div>
            <div class="editor-right">
                <button class="icon-btn" onclick="togglePin()" id="pinBtn" title="Sematkan">📌</button>
                <div class="dropdown-wrap">
                    <button class="icon-btn" onclick="toggleDropdown(event, 'actionMenu')">⋮</button>
                    <div class="dropdown-menu" id="actionMenu">
                        <button onclick="saveNote(event)">💾 Simpan</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button onclick="showInfo()">ℹ️ Detail Info</button>
                        <button onclick="exportTXT()">📄 Export .txt</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button id="btnTrash" onclick="softDeleteNote()" style="color: var(--danger);">🗑 Hapus ke Trash</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="editor-body">
            <div class="editor-container">
                <textarea id="titleInput" class="title-input" placeholder="Judul catatan..." rows="1" spellcheck="false" autocomplete="off" oninput="autoResizeTitle(); markAsEdited(); triggerAutoSave(); triggerHistorySave()" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('contentInput').focus();}"></textarea>
                <textarea id="contentInput" class="content-input" placeholder="Mulai menulis secara leluasa..." autocomplete="off" oninput="autoResizeContent(); updateCounter(); markAsEdited(); triggerAutoSave(); triggerHistorySave()"></textarea>
            </div>
        </div>
        <div class="editor-footer">
            <div class="word-count" id="wordCounter">
                <span>0 Kata</span> <div class="word-count-divider"></div> <span>0 Karakter</span>
            </div>
        </div>
    </div>
    <div class="info-modal" id="infoModal">
        <div class="info-box">
            <h3>Detail Catatan</h3>
            <div id="infoContent"></div>
            <button class="close-info" onclick="document.getElementById('infoModal').classList.remove('active')">Tutup Panel</button>
        </div>
    </div>
    <script src="../navbar/navbar.js"></script>

    <div class="side-panel-overlay" id="filterDrawerOverlay" onclick="if(event.target === this) closeFilterDrawer()">

                </div>
            </div>

            </button>
        </div>
    </div>
</div>
