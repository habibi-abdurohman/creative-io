<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notes - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">
    
    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <style>
        /* =========================================================
           CSS LENGKAP & REVISI UI MODERN
        ========================================================= */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        :root { --bg-grad: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); --sticky-bg: rgba(255, 255, 255, 0.75); --card-glass: rgba(255, 255, 255, 0.9); --card-solid: #ffffff; --card-tint: #f1f5f9; --border: #e2e8f0; --paper-line: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; --primary: #2563eb; --primary-soft: rgba(37, 99, 235, 0.1); --warning: #f59e0b; --danger: #ef4444; --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.04); --radius-btn: 14px; --radius-card: 20px; }
        body.dark { --bg-grad: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); --sticky-bg: rgba(30, 41, 59, 0.75); --card-glass: rgba(30, 41, 59, 0.9); --card-solid: #1e293b; --card-tint: #0f172a; --border: #334155; --paper-line: rgba(255, 255, 255, 0.05); --text-main: #f8fafc; --text-muted: #94a3b8; --primary-soft: rgba(59, 130, 246, 0.2); --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.2); }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-grad); color: var(--text-main); min-height: 100vh; padding: 76px 16px 100px; }
        
        .wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }
        
        /* HEADER LEBIH COMPACT */
        .top-header { display: flex; flex-direction: column; align-items: flex-start; margin-bottom: 8px; }
        .page-title { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        .page-subtitle { font-size: 13px; color: var(--text-muted); line-height: 1.6; margin-top: 4px; }
        
        /* =========================================================
           FLOATING PILL TOOLBAR (FIT-CONTENT)
        ========================================================= */
        .sticky-tools { 
            position: sticky; top: 76px; z-index: 50; padding: 8px 12px; margin: 16px auto 24px auto; 
            background: var(--sticky-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); 
            border: 1px solid var(--border); border-radius: 100px; 
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.05); transition: box-shadow 0.3s ease, border-radius 0.3s, width 0.3s;
            width: fit-content; max-width: 100%;
        }
        body.dark .sticky-tools { box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4); }
        
        @media(max-width: 768px) {
            .sticky-tools { width: 100%; border-radius: 20px; padding: 10px 16px; margin-bottom: 24px; }
        }
        
        .sticky-tools-inner { 
            position: relative; display: flex; align-items: center; 
            height: 38px; gap: 8px; max-width: 100%; margin: 0 auto; 
            overflow-x: auto; scrollbar-width: none; transition: gap 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none; 
        }
        .sticky-tools-inner::-webkit-scrollbar { display: none; }
        .sticky-tools-inner.searching { gap: 0; overflow: hidden; }

        .search-expandable { 
            flex-shrink: 0; display: flex; align-items: center; background: var(--card-solid); 
            border: 1px solid var(--border); border-radius: 12px; 
            height: 38px; width: 38px; overflow: hidden; 
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), border-color 0.3s, box-shadow 0.3s; 
            box-shadow: var(--shadow-flat);
        }
        body.dark .search-expandable { background: var(--card-solid); border-color: var(--border); }
        .search-expandable.expanded { border-color: var(--primary); }
        body.dark .search-expandable.expanded { box-shadow: 0 4px 16px rgba(37, 99, 235, 0.25); border-color: var(--primary); }
        
        .search-icon-btn, .close-search-btn { 
            flex-shrink: 0; min-width: 38px; height: 38px; background: transparent; border: none; font-size: 14px; 
            cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .search-expandable.expanded .search-icon-btn { color: var(--primary); pointer-events: none; }
        
        .search-expandable input { 
            flex: 1; border: none; outline: none; background: transparent; font-size: 13px; 
            color: var(--text-main); padding: 0 4px; opacity: 0; pointer-events: none; transition: opacity 0.2s 0.1s; 
        }
        .search-expandable.expanded input { opacity: 1; pointer-events: auto; }
        
        .close-search-btn { opacity: 0; pointer-events: none; }
        .close-search-btn:hover { color: var(--danger); }
        .search-expandable.expanded .close-search-btn { opacity: 1; pointer-events: auto; }
        
        .filters-wrapper {
            display: flex; align-items: center; gap: 8px; 
            max-width: 1000px; opacity: 1; overflow: hidden;
            flex-shrink: 0; transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
        }
        .sticky-tools-inner.searching .filters-wrapper { max-width: 0; opacity: 0; transition: max-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s ease; }
        
        .filter-btn { 
            flex-shrink: 0; padding: 8px 14px; border-radius: 10px; background: var(--card-solid); 
            border: 1px solid var(--border); font-size: 12px; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: 0.2s; white-space: nowrap; pointer-events: auto; 
            display: flex; align-items: center;
        }
        .filter-btn.icon-only { padding: 8px 10px; font-size: 16px; }
        .filter-btn.active { background: var(--primary-soft); border-color: var(--primary); color: var(--primary); }
        .divider { flex-shrink: 0; width: 1px; height: 18px; background: var(--border); margin: 0 2px; }
        
        /* =========================================================
           UI KARTU NOTES & LIST VIEW (MODE DAFTAR)
        ========================================================= */
        .notes-list { column-count: 4; column-gap: 16px; margin-top: 10px; transition: 0.3s ease; }
        
        /* Gaya Khusus Mode List View */
        .notes-list.list-view { 
            display: flex; flex-direction: column; gap: 12px; 
            max-width: 800px; margin: 10px auto 0 auto; 
        }
        .notes-list.list-view .note-card { margin-bottom: 0; width: 100%; }

        .empty-state { column-span: all; text-align: center; padding: 60px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); cursor: pointer; transition: 0.2s; }
        .empty-state:hover { background: var(--card-tint); }
        .empty-state-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.8; }
        .empty-state-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
        
        .note-card { break-inside: avoid; margin-bottom: 16px; padding: 20px 16px 16px 20px; border-radius: var(--radius-card); background: var(--card-glass); border: 1px solid var(--border); cursor: pointer; position: relative; overflow: hidden; box-shadow: var(--shadow-flat); transition: transform 0.2s, border-color 0.2s; background-image: linear-gradient(var(--paper-line) 1px, transparent 1px); background-size: 100% 28px; background-position: 0 12px; }
        .note-card:hover { transform: translateY(-2px); border-color: #cbd5e1; }
        .note-card.pinned { border-color: var(--warning); border-width: 2px; }
        
        .note-card.restored { border-left: 5px solid var(--warning); background-color: rgba(245, 158, 11, 0.03); padding-top: 24px; }
        body.dark .note-card.restored { background-color: rgba(245, 158, 11, 0.05); }
        
        .badge-corner { position: absolute; top: 0; right: 0; background: rgba(245, 158, 11, 0.15); color: var(--warning); font-size: 10px; font-weight: 800; padding: 5px 12px; border-bottom-left-radius: 12px; border-top-right-radius: 19px; border-bottom: 1px solid rgba(245, 158, 11, 0.2); border-left: 1px solid rgba(245, 158, 11, 0.2); z-index: 10; }
        body.dark .badge-corner { background: rgba(245, 158, 11, 0.25); }
        
        .note-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; position: relative; z-index: 2; }
        .note-title { font-size: 15px; font-weight: 800; line-height: 1.4; color: var(--text-main); }
        
        /* EFEK FADE-OUT TEKS (Preview Limitation) */
        .note-content-wrap {
            position: relative;
            max-height: 144px; /* Pembatasan Preview: 6 baris * 24px */
            overflow: hidden;
            z-index: 2;
        }
        .note-content { 
            font-size: 13px; line-height: 24px; color: var(--text-muted); 
            position: relative; z-index: 2; white-space: pre-wrap; 
        }
        /* Lapisan Kaca Memudar yang muncul jika teks kepanjangan */
        .note-content-wrap.faded::after {
            content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.9) 80%, rgba(255,255,255,1) 100%);
            pointer-events: none; z-index: 3;
        }
        body.dark .note-content-wrap.faded::after {
            background: linear-gradient(to bottom, rgba(30,41,59,0) 0%, rgba(30,41,59,0.9) 80%, rgba(30,41,59,1) 100%);
        }

        .note-footer { margin-top: 14px; padding-top: 10px; border-top: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
        .note-date { font-size: 11px; font-weight: 700; color: var(--text-muted); }
        
        .btn-quick-del { border: none; background: transparent; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px; border-radius: 6px; transition: 0.2s; }
        .btn-quick-del:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        
        /* DESAIN PAGINATION */
        .pagination-container {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 32px; padding-bottom: 24px; flex-wrap: wrap; column-span: all;
        }
        .page-btn {
            min-width: 38px; height: 38px; padding: 0 12px;
            border-radius: 12px; border: 1px solid var(--border); background: var(--card-solid);
            color: var(--text-main); font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s;
            font-family: 'Inter', system-ui, sans-serif;
        }
        .page-btn:hover:not(.disabled):not(.active) { background: var(--card-tint); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .page-dots { color: var(--text-muted); font-weight: 700; padding: 0 4px; }
        
        body.dark .page-btn { background: var(--card-solid, #1e293b); border-color: var(--border, #334155); color: var(--text-main, #f8fafc); }
        body.dark .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .fab { position: fixed; right: 24px; bottom: 24px; width: 56px; height: 56px; border: none; border-radius: 20px; background: var(--primary); color: white; font-size: 28px; cursor: pointer; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3); z-index: 100; display: flex; align-items: center; justify-content: center; }
        
        /* EDITOR IMMERSIVE */
        .editor { position: fixed; inset: 0; background: var(--bg-grad); z-index: 99999; display: none; flex-direction: column; }
        .editor.active { display: flex; }
        
        .editor-header { 
            display: flex; justify-content: space-between; align-items: center; 
            height: 52px; padding: 0 16px; 
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); flex-shrink: 0; 
        }
        body.dark .editor-header { background: rgba(15, 23, 42, 0.85); border-bottom: 1px solid var(--border, #334155); }
        
        .editor-left, .editor-right { display: flex; align-items: center; gap: 8px; }
        .auto-save { font-size: 11px; font-weight: 700; color: var(--text-muted); background: var(--card-tint); padding: 4px 10px; border-radius: 8px; opacity: 0; transition: 0.2s; }
        
        .icon-btn { 
            width: 34px; height: 34px; border: 1px solid var(--border); border-radius: 10px; 
            background: var(--card-solid); color: var(--text-main); cursor: pointer; 
            font-size: 15px; display: flex; align-items: center; justify-content: center; transition: 0.2s; 
        }
        .icon-btn:hover { background: var(--card-tint); }
        .icon-btn.disabled { opacity: 0.35; pointer-events: none; }
        body.dark .icon-btn { border-color: var(--border, #334155); background: var(--card-solid, #1e293b); color: var(--text-main, #f8fafc); }
        
        .editor-body { 
            flex: 1; overflow-y: auto; 
            padding: 40px 0 200px; 
            scroll-padding-bottom: 120px; 
            background-image: linear-gradient(var(--paper-line) 1px, transparent 1px); background-size: 100% 32px; background-position: 0 8px; background-attachment: local; 
        }
        
        .editor-container { 
            max-width: 1000px; width: 100%; margin: 0 auto; position: relative; padding: 0 24px; 
            display: block; 
        }
        
        .title-input { 
            width: 100%; border: none; outline: none; background: transparent; 
            font-size: 32px; font-weight: 900; color: var(--text-main); 
            margin-bottom: 24px; line-height: 1.3; 
            resize: none; overflow: hidden; 
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .content-input { 
            width: 100%; min-height: 70vh; border: none; outline: none; 
            resize: none; background: transparent; font-size: 16px; 
            line-height: 32px; color: var(--text-main); 
            overflow: hidden; 
            display: block; 
            font-family: 'Inter', system-ui, sans-serif;
        }
        
        .title-input::placeholder, .content-input::placeholder { color: var(--text-muted); opacity: 0.6; }
        
        .editor-footer { position: fixed; left: 0; right: 0; bottom: 0; background: var(--sticky-bg); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 14px 20px calc(14px + env(safe-area-inset-bottom)); display: flex; justify-content: space-between; align-items: center; z-index: 20; }
        body.dark .editor-footer { background: rgba(15, 23, 42, 0.9); }
        
        .word-count { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .save-btn { border: none; padding: 12px 28px; border-radius: 12px; background: var(--primary); color: white; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 16px rgba(37,99,235,0.2); }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(37,99,235,0.3); }

        .info-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 999999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .info-box { width: 100%; max-width: 340px; padding: 24px; border-radius: 24px; background: var(--card-solid); border: 1px solid var(--border); color: var(--text-main); box-shadow: var(--shadow-flat); }
        .info-box h3 { margin-bottom: 20px; font-size: 18px; font-weight: 800; text-align: center; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 13px; }
        .info-label { color: var(--text-muted); font-weight: 600; }
        .info-value { font-weight: 800; text-align: right; }
        .close-info { width: 100%; height: 46px; border: none; margin-top: 20px; border-radius: 14px; background: var(--card-tint); color: var(--text-main); font-weight: 800; cursor: pointer; }
        
        /* BREAKPOINT RESPONSIF */
        @media(max-width: 1024px) { .notes-list { column-count: 3; } }
        @media(max-width: 768px) { .notes-list { column-count: 2; } }
        @media(max-width: 480px) { 
            .notes-list { column-count: 2; column-gap: 12px; } 
            .notes-list.list-view { column-count: 1; }
            .note-card { padding: 16px 12px 12px 16px; margin-bottom: 12px; } 
            .note-title { font-size: 14px; } 
            .note-content { font-size: 12px; line-height: 24px; } 
            .editor-container { padding: 0 16px; }
            .title-input { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="top-header">
            <h1 class="page-title">Quick Notes</h1>
            <div class="page-subtitle">Catat ide cepat. Aman terhapus otomatis setelah 30 hari di Trash.</div>
        </div>

        <div class="sticky-tools">
            <div class="sticky-tools-inner" id="filterWrap">
                
                <div class="search-expandable" id="searchContainer">
                    <button class="search-icon-btn" onclick="openSearch(event)" title="Cari Catatan">🔍</button>
                    <input type="text" id="searchInput" placeholder="Cari catatan..." oninput="window.currentPage=1; window.renderNotes()">
                    <button class="close-search-btn" onclick="closeSearch(event)" title="Tutup Pencarian">✕</button>
                </div>
                
                <div class="filters-wrapper" id="filterButtons">
                    <button class="filter-btn active" id="filterAll" onclick="setFilter('all', this)">Semua</button>
                    <button class="filter-btn" id="filterPinned" onclick="setFilter('pinned', this)">📌 Pinned</button>
                    <div class="divider"></div>
                    <button class="filter-btn active" id="sortNewest" onclick="setSort('newest')">Terbaru</button>
                    <button class="filter-btn" id="sortOldest" onclick="setSort('oldest')">Terlama</button>
                    <div class="divider"></div>
                    <button class="filter-btn icon-only" id="viewToggleBtn" onclick="toggleViewMode()" title="Ubah Tampilan Grid/List">☰</button>
                </div>

            </div>
        </div>

        <div class="notes-list" id="notesList">
            <div style="text-align: center; padding: 40px; color: var(--text-muted); column-span: all;">Memuat data...</div>
        </div>

        <div id="paginationContainer" class="pagination-container"></div>

        <button class="fab" onclick="openEditor()">+</button>
    </div>

    <div class="editor" id="editor">
        <div class="editor-header">
            <div class="editor-left">
                <button class="icon-btn" onclick="closeEditor()">✕</button>
                <button class="icon-btn disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                </button>
                <button class="icon-btn disabled" id="btnRedo" onclick="handleRedo()" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
                <div class="auto-save" id="autoSaveStatus">Tersimpan ✓</div>
            </div>
            <div class="editor-right">
                <button class="icon-btn" onclick="showInfo()" title="Info">ℹ️</button>
                <button class="icon-btn" onclick="exportTXT()" title="Export .txt">📄</button>
                <button class="icon-btn" onclick="togglePin()" id="pinBtn" title="Sematkan">📌</button>
                <button class="icon-btn" onclick="softDeleteNote()" style="color:var(--danger);" title="Hapus ke Trash">🗑</button>
            </div>
        </div>

        <div class="editor-body">
            <div class="editor-container">
                <textarea id="titleInput" class="title-input" placeholder="Judul catatan..." rows="1" spellcheck="false" oninput="autoResizeTitle(); markAsEdited(); triggerAutoSave(); triggerHistorySave()" onkeydown="if(event.key==='Enter'){event.preventDefault(); document.getElementById('contentInput').focus();}"></textarea>
                
                <textarea id="contentInput" class="content-input" placeholder="Mulai menulis secara leluasa..." oninput="autoResizeContent(); updateCounter(); markAsEdited(); triggerAutoSave(); triggerHistorySave()"></textarea>
            </div>
        </div>

        <div class="editor-footer">
            <div class="word-count" id="wordCounter">0 kata | 0 karakter</div>
            <button class="save-btn" onclick="saveNote()">SIMPAN CATATAN</button>
        </div>
    </div>

    <div class="info-modal" id="infoModal">
        <div class="info-box">
            <h3>Detail Catatan</h3>
            <div id="infoContent"></div>
            <button class="close-info" onclick="document.getElementById('infoModal').style.display='none'">Tutup</button>
        </div>
    </div>

    <script src="../navbar/navbar.js"></script>
    <script src="../js/pwa.js"></script>
    
    <script type="module">
        import { auth, db } from "../js/firebase.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, query, where, getDocs, setDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        const USE_FIREBASE = true;

        window.notesData = [];
        window.currentId = null;
        window.currentFilter = 'all';
        window.currentSort = 'newest';
        window.currentPinned = false;
        window.isRestored = false; 
        
        // VIEW MODE TERSIMPAN DI LOKAL
        window.currentViewMode = localStorage.getItem('creative_notes_view') || 'grid';
        
        // VARIABEL PAGINATION DINAMIS
        window.currentPage = 1;
        window.itemsPerPage = 12;
        
        let autoSaveTimeout = null;
        let currentUserUid = null;
        
        window.historyStack = [];
        window.historyIndex = -1;
        let historyDebounceTimeout = null;
        let isUndoingRedoing = false;

        const formatFullDate = (ms) => {
            if(!ms) return '';
            const d = new Date(ms);
            const months = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            const time = String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()} • ${time}`;
        };

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("dashboard_theme") === "dark") document.body.classList.add("dark");

            window.updateItemsPerPage();
            window.updateViewToggleBtn();

            // FIX SCROLL FILTER UNTUK LAPTOP (DRAG & WHEEL)
            const filterWrap = document.getElementById('filterWrap');
            if (filterWrap) {
                let isDown = false;
                let startX;
                let scrollLeft;

                filterWrap.addEventListener('mousedown', (e) => {
                    if(e.target.tagName.toLowerCase() === 'input') return; 
                    isDown = true;
                    filterWrap.style.cursor = 'grabbing';
                    startX = e.pageX - filterWrap.offsetLeft;
                    scrollLeft = filterWrap.scrollLeft;
                });
                filterWrap.addEventListener('mouseleave', () => { isDown = false; filterWrap.style.cursor = ''; });
                filterWrap.addEventListener('mouseup', () => { isDown = false; filterWrap.style.cursor = ''; });

                filterWrap.addEventListener('mousemove', (e) => {
                    if (!isDown) return;
                    e.preventDefault(); 
                    const x = e.pageX - filterWrap.offsetLeft;
                    const walk = (x - startX) * 1.5; 
                    filterWrap.scrollLeft = scrollLeft - walk;
                });

                filterWrap.addEventListener('wheel', (e) => {
                    if (e.deltaY !== 0) {
                        e.preventDefault();
                        filterWrap.scrollLeft += e.deltaY;
                    }
                }, { passive: false });
            }

            if (USE_FIREBASE) {
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        currentUserUid = user.uid;
                        loadDataFromCloud();
                    } else {
                        window.location.replace("../login.html");
                    }
                });
            } else {
                if (localStorage.getItem('dummy_logged_in') !== 'true') {
                    window.location.replace("../login.html");
                } else {
                    currentUserUid = 'local_user';
                    window.notesData = JSON.parse(localStorage.getItem('creative_notes_v2')) || [];
                    window.renderNotes();
                }
            }
        });

        // ==========================================
        // FITUR VIEW MODE (GRID / LIST)
        // ==========================================
        window.updateViewToggleBtn = function() {
            const btn = document.getElementById('viewToggleBtn');
            if(btn) btn.innerText = window.currentViewMode === 'grid' ? '☰' : '🔲';
        };

        window.toggleViewMode = function() {
            window.currentViewMode = window.currentViewMode === 'grid' ? 'list' : 'grid';
            localStorage.setItem('creative_notes_view', window.currentViewMode);
            window.updateViewToggleBtn();
            window.renderNotes();
        };

        window.updateItemsPerPage = function() {
            const width = window.innerWidth;
            let newLimit = 18; 
            if (width <= 600) newLimit = 12; 
            else if (width <= 1024) newLimit = 16; 

            if (window.itemsPerPage !== newLimit) {
                window.itemsPerPage = newLimit;
                if (window.notesData && window.notesData.length > 0) {
                    window.currentPage = 1;
                    window.renderNotes();
                }
            }
        }
        window.addEventListener('resize', () => {
            clearTimeout(window.resizeTimeout);
            window.resizeTimeout = setTimeout(window.updateItemsPerPage, 200);
        });

        async function loadDataFromCloud() {
            try {
                const q = query(collection(db, "creative_notes_v2"), where("uid", "==", currentUserUid));
                const snap = await getDocs(q);
                
                window.notesData = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                window.renderNotes();
            } catch (error) {
                console.error("Error memuat data dari cloud:", error);
                document.getElementById('notesList').innerHTML = `
                    <div class="empty-state" style="border-color: var(--danger); background: rgba(239, 68, 68, 0.05);">
                        <div class="empty-state-icon" style="color: var(--danger);">🔒</div>
                        <div class="empty-state-text" style="color: var(--danger); font-weight: 700;">
                            Akses Database Ditolak.<br>Pastikan Anda sudah menambahkan Firebase Rules untuk Notes.
                        </div>
                    </div>`;
                document.getElementById('paginationContainer').innerHTML = '';
            }
        }

        window.openSearch = function(event) {
            if (event) event.stopPropagation();
            const wrap = document.getElementById('filterWrap');
            const searchBox = document.getElementById('searchContainer');
            
            wrap.scrollTo({left: 0, behavior: 'smooth'}); 
            wrap.classList.add('searching');
            searchBox.style.width = '100%';
            searchBox.classList.add('expanded');
            setTimeout(() => { document.getElementById('searchInput').focus(); }, 300);
        }

        window.closeSearch = function(event) {
            if (event) event.stopPropagation();
            const wrap = document.getElementById('filterWrap');
            const searchBox = document.getElementById('searchContainer');
            
            searchBox.style.width = '38px';
            searchBox.classList.remove('expanded');
            wrap.classList.remove('searching');
            
            const input = document.getElementById('searchInput');
            if (input.value !== '') {
                input.value = '';
                window.currentPage = 1;
                window.renderNotes(); 
            }
        }

        document.addEventListener('click', function(e) {
            const searchContainer = document.getElementById('searchContainer');
            if (searchContainer && searchContainer.classList.contains('expanded')) {
                if (!searchContainer.contains(e.target)) {
                    window.closeSearch();
                }
            }
        });

        window.autoResizeTitle = function() {
            const el = document.getElementById('titleInput');
            const parent = document.querySelector('.editor-body');
            const scrollPos = parent.scrollTop; 
            el.style.height = 'auto'; 
            el.style.height = el.scrollHeight + 'px'; 
            el.scrollTop = 0; 
            parent.scrollTop = scrollPos; 
        }

        window.autoResizeContent = function() {
            const el = document.getElementById('contentInput');
            const parent = document.querySelector('.editor-body');
            const scrollPos = parent.scrollTop; 
            el.style.height = 'auto'; 
            el.style.height = el.scrollHeight + 'px'; 
            el.scrollTop = 0; 
            parent.scrollTop = scrollPos; 
        }
        
        window.updateUndoRedoButtons = function() {
            const btnUndo = document.getElementById('btnUndo');
            const btnRedo = document.getElementById('btnRedo');
            if (window.historyIndex > 0) btnUndo.classList.remove('disabled');
            else btnUndo.classList.add('disabled');
            
            if (window.historyIndex < window.historyStack.length - 1) btnRedo.classList.remove('disabled');
            else btnRedo.classList.add('disabled');
        }

        window.saveHistoryState = function() {
            if (isUndoingRedoing) return; 
            const title = document.getElementById('titleInput').value;
            const content = document.getElementById('contentInput').value;
            const currentState = { title, content };
            
            if (window.historyIndex >= 0) {
                const lastState = window.historyStack[window.historyIndex];
                if (lastState.title === title && lastState.content === content) return;
            }
            if (window.historyIndex < window.historyStack.length - 1) {
                window.historyStack = window.historyStack.slice(0, window.historyIndex + 1);
            }
            
            window.historyStack.push(currentState);
            if (window.historyStack.length > 50) {
                window.historyStack.shift();
            } else {
                window.historyIndex++;
            }
            window.updateUndoRedoButtons();
        }

        window.triggerHistorySave = function() {
            clearTimeout(historyDebounceTimeout);
            historyDebounceTimeout = setTimeout(() => { window.saveHistoryState(); }, 800); 
        }

        window.handleUndo = function() {
            if (window.historyIndex > 0) {
                isUndoingRedoing = true;
                window.historyIndex--;
                const state = window.historyStack[window.historyIndex];
                document.getElementById('titleInput').value = state.title;
                document.getElementById('contentInput').value = state.content;
                window.autoResizeTitle(); window.autoResizeContent(); 
                window.updateCounter(); window.markAsEdited();
                window.triggerAutoSave(); window.updateUndoRedoButtons();
                setTimeout(() => { isUndoingRedoing = false; }, 50);
            }
        }

        window.handleRedo = function() {
            if (window.historyIndex < window.historyStack.length - 1) {
                isUndoingRedoing = true;
                window.historyIndex++;
                const state = window.historyStack[window.historyIndex];
                document.getElementById('titleInput').value = state.title;
                document.getElementById('contentInput').value = state.content;
                window.autoResizeTitle(); window.autoResizeContent(); 
                window.updateCounter(); window.markAsEdited();
                window.triggerAutoSave(); window.updateUndoRedoButtons();
                setTimeout(() => { isUndoingRedoing = false; }, 50);
            }
        }

        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('editor').classList.contains('active')) return;
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z') {
                e.preventDefault();
                if (e.shiftKey) { window.handleRedo(); } else { window.handleUndo(); }
            }
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y') {
                e.preventDefault(); window.handleRedo();
            }
        });

        window.performSave = async function(isAuto = false) {
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value;
            if (title === '' && content.trim() === '') return;
            const now = Date.now();
            const docId = window.currentId || "qn_" + now;
            window.currentId = docId;

            const payload = {
                uid: currentUserUid, title: title || 'Tanpa Judul', content: content,
                pinned: window.currentPinned, isRestored: window.isRestored, updatedAt: now
            };

            const existingIndex = window.notesData.findIndex(x => x.id === docId);
            if(existingIndex > -1) {
                payload.createdAt = window.notesData[existingIndex].createdAt;
                window.notesData[existingIndex] = { id: docId, ...payload };
            } else {
                payload.createdAt = now;
                window.notesData.unshift({ id: docId, ...payload });
            }

            if(!isAuto) window.renderNotes();

            if (USE_FIREBASE) {
                try { 
                    await setDoc(doc(db, "creative_notes_v2", docId), payload); 
                } catch (e) {
                    console.error("Gagal menyimpan ke cloud:", e);
                    if (!isAuto) alert("Gagal menyimpan catatan.");
                }
            } else {
                localStorage.setItem('creative_notes_v2', JSON.stringify(window.notesData));
            }
        }

        window.markAsEdited = function() {
            if (window.isRestored) window.isRestored = false;
        }

        window.softDeleteNote = async function(idOverride = null) {
            const idToDelete = idOverride || window.currentId;
            if (!idToDelete) return;
            if (!confirm('Pindahkan catatan ini ke tempat sampah? (Otomatis terhapus setelah 30 hari)')) return;

            const itemIndex = window.notesData.findIndex(x => x.id === idToDelete);
            if(itemIndex === -1) return;
            const item = window.notesData[itemIndex];
            const now = Date.now();
            const trashId = 'trash_' + now;

            const trashPayload = {
                uid: currentUserUid, originalId: item.id, type: 'notes',
                title: item.title, content: item.content, deletedAt: now, expireAt: now + (30 * 24 * 60 * 60 * 1000)
            };

            window.notesData.splice(itemIndex, 1);
            window.closeEditor(); 
            window.renderNotes(); 

            if (USE_FIREBASE) {
                try {
                    await setDoc(doc(db, "creative_trash", trashId), trashPayload);
                    await deleteDoc(doc(db, "creative_notes_v2", item.id));
                } catch (e) {
                    console.error("Gagal memindahkan ke trash:", e);
                    alert("Gagal menghapus catatan.");
                }
            } else {
                let trashData = JSON.parse(localStorage.getItem('creative_trash')) || [];
                trashData.push({ id: trashId, ...trashPayload });
                localStorage.setItem('creative_trash', JSON.stringify(trashData));
                localStorage.setItem('creative_notes_v2', JSON.stringify(window.notesData));
            }
        }

        window.setFilter = function(type, el) { 
            window.currentFilter = type; 
            document.getElementById('filterAll').classList.remove('active');
            document.getElementById('filterPinned').classList.remove('active');
            el.classList.add('active');
            window.currentPage = 1; 
            window.renderNotes(); 
        }
        
        window.setSort = function(type) { 
            window.currentSort = type; 
            document.getElementById('sortNewest').classList.remove('active');
            document.getElementById('sortOldest').classList.remove('active');
            document.getElementById(type === 'newest' ? 'sortNewest' : 'sortOldest').classList.add('active');
            window.currentPage = 1; 
            window.renderNotes(); 
        }

        window.openEditor = function(id = null) {
            document.getElementById('editor').classList.add('active');
            if (id) {
                const item = window.notesData.find(x => x.id === id);
                if(item) {
                    window.currentId = item.id; 
                    window.currentPinned = item.pinned || false;
                    window.isRestored = item.isRestored || false; 
                    document.getElementById('titleInput').value = item.title;
                    document.getElementById('contentInput').value = item.content;
                }
            } else {
                window.currentId = null; window.currentPinned = false; window.isRestored = false;
                document.getElementById('titleInput').value = ''; document.getElementById('contentInput').value = '';
            }
            
            setTimeout(() => { window.autoResizeTitle(); window.autoResizeContent(); }, 10);
            
            window.historyStack = []; window.historyIndex = -1; window.updateUndoRedoButtons();
            setTimeout(() => { window.saveHistoryState(); }, 50);
            
            updatePin(); updateCounter();
        }

        window.closeEditor = function() {
            const title = document.getElementById('titleInput').value.trim();
            const content = document.getElementById('contentInput').value.trim();
            if(title || content) {
                if(typeof window.performSave === "function") window.performSave(true);
            }
            document.getElementById('editor').classList.remove('active');
            window.renderNotes(); 
        }

        window.togglePin = function() { window.currentPinned = !window.currentPinned; updatePin(); triggerAutoSave(); }
        function updatePin() { document.getElementById('pinBtn').style.opacity = window.currentPinned ? '1' : '0.4'; }

        window.updateCounter = function() {
            const text = document.getElementById('contentInput').value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('wordCounter').innerHTML = `${words.toLocaleString('id-ID')} kata | ${text.length.toLocaleString('id-ID')} karakter`;
        }

        window.triggerAutoSave = function() {
            clearTimeout(autoSaveTimeout);
            autoSaveTimeout = setTimeout(() => {
                if(typeof window.performSave === "function") {
                    window.performSave(true);
                    const indicator = document.getElementById('autoSaveStatus');
                    indicator.style.opacity = '1';
                    setTimeout(() => indicator.style.opacity = '0', 2000);
                }
            }, 1000); 
        }

        window.saveNote = function() {
            if(typeof window.performSave === "function") window.performSave(false);
            window.closeEditor();
        }

        window.exportTXT = function() {
            const text = document.getElementById('contentInput').value;
            if(!text) return alert("Catatan masih kosong.");
            const blob = new Blob([text], { type: 'text/plain' });
            const link = document.createElement('a'); link.href = URL.createObjectURL(blob);
            link.download = (document.getElementById('titleInput').value || 'Notes_CreativeIO') + '.txt'; link.click();
        }

        window.showInfo = function() {
            if(!window.currentId) return alert("Catatan belum disimpan.");
            const item = window.notesData.find(x => x.id === window.currentId);
            if(!item) return;

            const text = document.getElementById('contentInput').value;
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;

            document.getElementById('infoContent').innerHTML = `
                <div class="info-row"><span class="info-label">Judul</span> <span class="info-value">${item.title || 'Tanpa Judul'}</span></div>
                <div class="info-row"><span class="info-label">Jumlah Kata</span> <span class="info-value">${words.toLocaleString('id-ID')}</span></div>
                <div class="info-row"><span class="info-label">Karakter</span> <span class="info-value">${text.length.toLocaleString('id-ID')}</span></div>
                <div class="info-row"><span class="info-label">Dibuat</span> <span class="info-value">${formatFullDate(item.createdAt)}</span></div>
                <div class="info-row"><span class="info-label">Diubah</span> <span class="info-value">${formatFullDate(item.updatedAt)}</span></div>
            `;
            document.getElementById('infoModal').style.display = 'flex';
        }

        window.changePage = function(page) {
            window.currentPage = page;
            window.renderNotes();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.renderPagination = function(totalPages) {
            const container = document.getElementById('paginationContainer');
            if (totalPages <= 1) {
                container.innerHTML = '';
                return;
            }

            let html = `<button class="page-btn ${window.currentPage === 1 ? 'disabled' : ''}" onclick="changePage(${window.currentPage - 1})">❮</button>`;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= window.currentPage - 1 && i <= window.currentPage + 1)) {
                    html += `<button class="page-btn ${i === window.currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
                } else if (i === window.currentPage - 2 || i === window.currentPage + 2) {
                    html += `<span class="page-dots">...</span>`;
                }
            }
            
            html += `<button class="page-btn ${window.currentPage === totalPages ? 'disabled' : ''}" onclick="changePage(${window.currentPage + 1})">❯</button>`;
            container.innerHTML = html;
        }

        window.renderNotes = function() {
            const listContainer = document.getElementById('notesList');
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            let data = [...window.notesData]; 

            // ===============================================
            // UPDATE ANGKA TOTAL DI BADGE FILTER "SEMUA" & "PINNED"
            // ===============================================
            const totalAll = window.notesData.length;
            const totalPinned = window.notesData.filter(x => x.pinned).length;
            document.getElementById('filterAll').innerHTML = `Semua <span style="opacity:0.6; font-size:11px; margin-left:4px;">${totalAll}</span>`;
            document.getElementById('filterPinned').innerHTML = `📌 Pinned <span style="opacity:0.6; font-size:11px; margin-left:4px;">${totalPinned}</span>`;

            // TAHAP 1: FILTERING & SORTING
            if(window.currentFilter === 'pinned') data = data.filter(x => x.pinned);

            data.sort((a, b) => {
                if(a.pinned && !b.pinned) return -1;
                if(!a.pinned && b.pinned) return 1;
                const timeA = a.createdAt || 0; const timeB = b.createdAt || 0;
                return window.currentSort === 'oldest' ? timeA - timeB : timeB - timeA; 
            });

            data = data.filter(item => {
                const title = item.title ? item.title.toLowerCase() : "";
                const content = item.content ? item.content.toLowerCase() : "";
                return title.includes(keyword) || content.includes(keyword);
            });

            // TAHAP 2: KALKULASI PAGINATION
            const totalItems = data.length;
            const totalPages = Math.ceil(totalItems / window.itemsPerPage);
            
            if (totalPages > 0 && window.currentPage > totalPages) window.currentPage = totalPages;
            else if (totalPages === 0) window.currentPage = 1;

            if (totalItems === 0) {
                listContainer.innerHTML = `<div class="empty-state" onclick="openEditor()"><div class="empty-state-icon">📄</div><div class="empty-state-text">Belum ada catatan.<br>Ketuk di sini untuk menulis.</div></div>`;
                document.getElementById('paginationContainer').innerHTML = '';
                return;
            }
            
            // TAHAP 3: PEMOTONGAN DATA (SLICE)
            const startIndex = (window.currentPage - 1) * window.itemsPerPage;
            const endIndex = startIndex + window.itemsPerPage;
            const paginatedData = data.slice(startIndex, endIndex);

            let html = '';
            paginatedData.forEach(item => {
                const cardClass = `note-card ${item.pinned ? 'pinned' : ''} ${item.isRestored ? 'restored' : ''}`;
                
                html += `
                <div class="${cardClass}" onclick="openEditor('${item.id}')">
                    ${item.isRestored ? '<div class="badge-corner">♻️ Dipulihkan</div>' : ''}
                    <div class="note-top">
                        <div class="note-title">${item.title}</div>
                        ${item.pinned ? '<span title="Disematkan" style="font-size:14px; z-index:2;">📌</span>' : ''}
                    </div>
                    <div class="note-content-wrap">
                        <div class="note-content">${item.content || '<em>Kosong...</em>'}</div>
                    </div>
                    <div class="note-footer">
                        <div style="display:flex; align-items:center;">
                            <div class="note-date">${formatFullDate(item.updatedAt)}</div>
                        </div>
                        <button class="btn-quick-del" onclick="event.stopPropagation(); softDeleteNote('${item.id}')" title="Hapus">🗑️</button>
                    </div>
                </div>`;
            });
            listContainer.innerHTML = html;

            // ===============================================
            // TERAPKAN VIEW MODE (GRID/LIST)
            // ===============================================
            if (window.currentViewMode === 'list') {
                listContainer.classList.add('list-view');
            } else {
                listContainer.classList.remove('list-view');
            }

            // ===============================================
            // LOGIKA FADE-OUT (Deteksi Teks Panjang Otomatis)
            // ===============================================
            setTimeout(() => {
                document.querySelectorAll('.note-content-wrap').forEach(el => {
                    if (el.scrollHeight > el.clientHeight + 5) {
                        el.classList.add('faded');
                    }
                });
            }, 50);

            window.renderPagination(totalPages);
        }
    </script>
</body>
</html>
