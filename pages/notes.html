<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Notes - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="../assets/favicon-192x192.png">
    
    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#f8fbff" id="themeColorMeta">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root { 
            --bg-grad: #f8fbff; 
            --sticky-bg: rgba(255, 255, 255, 0.75);
            --card-glass: rgba(255, 255, 255, 0.95);
            --card-solid: #ffffff;
            --card-tint: #f1f5f9;
            --border: #e2e8f0; 
            --paper-line: #e2e8f0;
            --text-main: #0f172a; 
            --text-muted: #64748b; 
            --primary: #2563eb; 
            --primary-grad: linear-gradient(135deg, #3b82f6, #2563eb); 
            --primary-soft: rgba(37, 99, 235, 0.1); 
            --success: #16a34a; 
            --danger: #ef4444; 
            --warning: #f59e0b; 
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.04); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.08);
            --radius-btn: 14px; 
            --radius-card: 20px; 
            --radius-pill: 100px;
        }
        
        body.dark { 
            --bg-grad: #0f172a; 
            --sticky-bg: rgba(15, 23, 42, 0.75);
            --card-glass: rgba(30, 41, 59, 0.95);
            --card-solid: #1e293b; 
            --card-tint: #334155; 
            --border: #334155; 
            --paper-line: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc; 
            --text-muted: #94a3b8; 
            --shadow-flat: 0 10px 30px rgba(0, 0, 0, 0.2); 
            --shadow-float: 0 12px 40px rgba(0, 0, 0, 0.4);
        }
        
        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-grad); 
            color: var(--text-main); 
            min-height: 100vh; 
            padding: 68px 16px 100px 16px; 
            transition: background 0.3s ease;
        }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }

        .island-wrapper {
            position: sticky; 
            top: 68px; 
            z-index: 50; 
            max-width: 1200px; 
            margin: 0 auto 24px auto;
            pointer-events: none; 
            display: flex;
            justify-content: center;
            opacity: 0;
            transform: translateY(-10px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        
        .island-wrapper.loaded {
            opacity: 1;
            transform: translateY(0);
        }

        .control-island {
            pointer-events: auto; 
            background: var(--sticky-bg); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border); 
            border-radius: var(--radius-pill); 
            padding: 6px; 
            width: max-content;
            max-width: 100%; 
            box-shadow: var(--shadow-float); 
            overflow: hidden; 
            -webkit-mask-image: -webkit-radial-gradient(white, black); 
            transform: translateZ(0); 
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .control-island.searching .island-scroll {
            gap: 0;
        }

        .island-scroll {
            display: flex; 
            align-items: center; 
            gap: 6px; 
            width: 100%; 
            overflow-x: auto; 
            scrollbar-width: none; 
            -webkit-overflow-scrolling: touch;
            cursor: grab;
            border-radius: 100px;
        }
        .island-scroll:active { cursor: grabbing; }
        .island-scroll::-webkit-scrollbar { display: none; }

        .search-module { 
            display: flex; 
            align-items: center; 
            background: var(--card-solid); 
            border: 1px solid var(--border);
            border-radius: var(--radius-pill); 
            height: 44px; 
            width: 44px; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            flex-shrink: 0;
            overflow: hidden;
        }

        .control-island.searching .search-module { 
            width: 100%; 
            flex: 1; 
            border-color: var(--primary); 
            box-shadow: 0 0 0 3px var(--primary-soft); 
        }
        
        .btn-island-icon { 
            flex-shrink: 0; width: 44px; height: 44px; 
            background: transparent; border: none; font-size: 16px; 
            cursor: pointer; color: var(--text-muted); display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }

        .control-island.searching .btn-island-icon.search-btn { color: var(--primary); pointer-events: none; }
        
        .btn-island-icon.close-btn { opacity: 0; pointer-events: none; width: 0; }
        .control-island.searching .btn-island-icon.close-btn { opacity: 1; pointer-events: auto; width: 44px; }
        .btn-island-icon.close-btn:hover { color: var(--danger); }
        
        .search-module input { 
            flex: 1; border: none; outline: none; background: transparent; 
            font-size: 14px; font-weight: 600; color: var(--text-main); 
            padding: 0; opacity: 0; pointer-events: none; width: 0;
            transition: opacity 0.2s 0.1s; font-family: inherit;
        }
        .control-island.searching .search-module input { opacity: 1; pointer-events: auto; width: auto; padding: 0 4px; }

        .filter-module {
            display: flex; align-items: center; gap: 6px; 
            flex-shrink: 0; 
            margin: 0; padding: 0; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .control-island.searching .filter-module { 
            max-width: 0; opacity: 0; margin: 0; padding: 0; gap: 0; pointer-events: none; overflow: hidden;
        }

        .filter-btn { 
            height: 38px;
            padding: 0 16px; 
            border-radius: 100px;
            display: flex; align-items: center; gap: 8px;
            background: transparent; border: none; 
            font-size: 13px; font-weight: 700; color: var(--text-muted); 
            cursor: pointer; transition: all 0.2s; white-space: nowrap; outline: none; flex-shrink: 0;
        }
        .filter-btn:hover { background: var(--card-tint); color: var(--text-main); }
        .filter-btn:active { transform: scale(0.95); }
        
        .filter-btn.active { background: var(--primary) !important; color: white !important; box-shadow: none !important; }
        
        .f-count {
            background: var(--border); color: var(--text-main);
            padding: 2px 8px; border-radius: 12px; font-size: 11px; font-weight: 800;
            transition: 0.2s;
        }
        .filter-btn.active .f-count { background: rgba(255,255,255,0.25); color: white; }
        
        .island-divider { flex-shrink: 0; width: 1px; height: 20px; background: var(--border); margin: 0 2px; }

        .grid-wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }

        .notes-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            width: 100%;
        }

        @media(max-width: 1024px) { .notes-list { grid-template-columns: repeat(2, 1fr); } }
        @media(max-width: 600px) { .notes-list { grid-template-columns: 1fr; } }

        .empty-state { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); cursor: pointer; transition: 0.2s; }
        .empty-state:hover { background: var(--card-tint); transform: scale(0.99); }
        .empty-state-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.8; }
        .empty-state-text { font-size: 14px; font-weight: 600; color: var(--text-muted); line-height: 1.6; }
        
        .note-card { 
            display: flex; flex-direction: column; height: 100%; 
            padding: 16px; border-radius: var(--radius-card); background: var(--card-glass); 
            border: 1px solid var(--border); cursor: pointer; position: relative; overflow: hidden; 
            box-shadow: var(--shadow-flat); transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
            background-image: linear-gradient(var(--paper-line) 1px, transparent 1px); 
            background-size: 100% 24px; background-position: 0 16px; 
        }
        .note-card:hover { transform: translateY(-4px); border-color: var(--primary-soft); box-shadow: var(--shadow-float); }
        .note-card:active { transform: scale(0.98); }
        
        .note-card.pinned { border-left: 4px solid var(--warning); border-width: 1px 1px 1px 4px; }
        .note-card.restored { background-color: rgba(245, 158, 11, 0.03); padding-top: 24px; }
        body.dark .note-card.restored { background-color: rgba(245, 158, 11, 0.05); }
        
        .badge-corner { position: absolute; top: 0; right: 0; background: rgba(245, 158, 11, 0.15); color: var(--warning); font-size: 10px; font-weight: 800; padding: 5px 12px; border-bottom-left-radius: 12px; border-top-right-radius: 19px; border-bottom: 1px solid rgba(245, 158, 11, 0.2); border-left: 1px solid rgba(245, 158, 11, 0.2); z-index: 10; }
        body.dark .badge-corner { background: rgba(245, 158, 11, 0.25); }
        
        .note-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; position: relative; z-index: 2; }
        
        .note-title { 
            font-size: 16px; font-weight: 800; color: var(--text-main); word-break: break-word; 
            line-height: 22px; height: 22px;
            display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .note-content { font-size: 13px; color: var(--text-muted); position: relative; z-index: 2; white-space: normal; word-break: break-word; 
            line-height: 20px; height: 40px;
            margin-top: 4px; margin-bottom: 12px; 
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .note-footer { margin-top: auto; padding-top: 0; border-top: none; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2; }
        .note-date { font-size: 11px; font-weight: 700; color: var(--text-muted); }
        
        .btn-quick-del { border: none; background: transparent; color: var(--text-muted); font-size: 14px; cursor: pointer; padding: 4px; border-radius: 6px; transition: 0.2s; display: flex; justify-content: center; align-items: center;}
        .btn-quick-del:hover { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .btn-quick-del:active { transform: scale(0.9); }
        
        .pagination-container {
            display: flex; justify-content: center; align-items: center; gap: 8px;
            margin-top: 32px; flex-wrap: wrap; grid-column: 1 / -1;
        }
        .page-btn {
            min-width: 40px; height: 40px; padding: 0 12px;
            border-radius: var(--radius-btn); border: 1px solid var(--border); background: var(--card-glass);
            color: var(--text-main); font-size: 14px; font-weight: 700; cursor: pointer;
            display: flex; justify-content: center; align-items: center; transition: all 0.2s;
            font-family: inherit;
        }
        .page-btn:hover:not(.disabled):not(.active) { background: var(--card-tint); transform: translateY(-2px); }
        .page-btn:active:not(.disabled) { transform: scale(0.95); }
        .page-btn.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.25); }
        .page-btn.disabled { opacity: 0.4; pointer-events: none; }
        .page-dots { color: var(--text-muted); font-weight: 700; padding: 0 4px; }

        .fab { position: fixed; right: 24px; bottom: 24px; width: 60px; height: 60px; border: none; border-radius: 20px; background: var(--primary-grad); color: white; font-size: 28px; cursor: pointer; box-shadow: 0 12px 30px rgba(37, 99, 235, 0.35); z-index: 100; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .fab:hover { transform: translateY(-4px) scale(1.02); box-shadow: 0 16px 40px rgba(37, 99, 235, 0.45); }
        .fab:active { transform: scale(0.92); }
        
        .editor { position: fixed; inset: 0; background: var(--bg-grad); z-index: 99999; display: none; flex-direction: column; }
        .editor.active { display: flex; }
        
        .editor-header { 
            display: flex; justify-content: space-between; align-items: center; 
            height: 52px; padding: 0 16px; 
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); flex-shrink: 0; 
        }
        body.dark .editor-header { background: rgba(15, 23, 42, 0.7); border-bottom: 1px solid var(--border); }
        
        .dropdown-wrap { position: relative; }
        .dropdown-menu { position: absolute; top: 44px; right: 0; background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 8px; display: none; flex-direction: column; gap: 4px; min-width: 180px; box-shadow: var(--shadow-float); z-index: 1000; }
        body.dark .dropdown-menu { border-color: var(--border); }
        .dropdown-menu.active { display: flex; }
        .dropdown-menu button { background: transparent; border: none; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; color: var(--text-main); text-align: left; cursor: pointer; transition: 0.2s; font-family: inherit; outline: none;}
        .dropdown-menu button:hover { background: var(--card-tint); }

        .editor-left, .editor-right { display: flex; align-items: center; gap: 8px; }
        .auto-save { font-size: 11px; font-weight: 800; color: var(--text-muted); background: var(--card-tint); padding: 4px 10px; border-radius: 10px; opacity: 0; transition: 0.2s; }
        
        .icon-btn { 
            width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 10px; 
            background: var(--card-solid); color: var(--text-main); cursor: pointer; 
            font-size: 15px; display: flex; align-items: center; justify-content: center; transition: 0.2s; 
        }
        .icon-btn:hover { background: var(--card-tint); }
        .icon-btn:active { transform: scale(0.92); }
        .icon-btn.disabled { opacity: 0.35; pointer-events: none; }
        .icon-btn.active-pin { background: var(--warning); border-color: var(--warning); color: white; }
        body.dark .icon-btn { border-color: var(--border); background: var(--card-solid); color: var(--text-main); }
        
        .editor-body { 
            flex: 1; overflow-y: auto; 
            padding: 40px 0 200px; 
            scroll-padding-bottom: 120px; 
            background-image: linear-gradient(var(--paper-line) 1px, transparent 1px); background-size: 100% 32px; background-position: 0 8px; background-attachment: local; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        .editor-body::-webkit-scrollbar { display: none; }
        
        .editor-container { max-width: 1000px; width: 100%; margin: 0 auto; position: relative; padding: 0 24px; display: block; }
        
        .title-input { 
            width: 100%; border: none; outline: none; background: transparent; 
            font-size: 32px; font-weight: 900; color: var(--text-main); 
            margin-bottom: 24px; line-height: 1.3; letter-spacing: -0.5px;
            resize: none; overflow: hidden; font-family: inherit;
        }
        
        .content-input { 
            width: 100%; min-height: 70vh; border: none; outline: none; 
            resize: none; background: transparent; font-size: 16px; 
            line-height: 32px; color: var(--text-main); 
            overflow: hidden; display: block; font-family: inherit;
        }
        
        .title-input::placeholder, .content-input::placeholder { color: var(--text-muted); opacity: 0.5; }
        
        .editor-footer { 
            width: 100%; flex-shrink: 0;
            background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); border-top: 1px solid var(--border); 
            padding: 16px 24px calc(16px + env(safe-area-inset-bottom)); 
            display: flex; justify-content: space-between; align-items: center; z-index: 20; 
        }
        body.dark .editor-footer { background: rgba(15, 23, 42, 0.85); }
        
        .word-count { font-size: 13px; font-weight: 700; color: var(--text-muted); }
        .save-btn { border: none; padding: 14px 28px; border-radius: var(--radius-btn); background: var(--primary-grad); color: white; font-size: 14px; font-weight: 800; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(37,99,235,0.25); font-family: inherit; }
        .save-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(37,99,235,0.35); }
        .save-btn:active { transform: scale(0.95); }

        .info-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .info-box { width: 100%; max-width: 380px; padding: 32px; border-radius: var(--radius-card); background: var(--card-solid); border: 1px solid var(--border); color: var(--text-main); box-shadow: var(--shadow-float); font-family: inherit; transform: scale(0.95); opacity: 0; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .info-modal.active { display: flex; }
        .info-modal.active .info-box { transform: scale(1); opacity: 1; }
        .info-box h3 { margin-bottom: 24px; font-size: 20px; font-weight: 900; text-align: center; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 14px; font-size: 14px; border-bottom: 1px solid var(--border); padding-bottom: 8px;}
        .info-row:last-child { border: none; }
        .info-label { color: var(--text-muted); font-weight: 600; }
        .info-value { font-weight: 800; text-align: right; max-width: 60%; word-break: break-word;}
        .close-info { width: 100%; padding: 14px; margin-top: 24px; border: none; border-radius: var(--radius-btn); background: var(--card-tint); color: var(--text-main); font-weight: 800; cursor: pointer; transition: 0.2s; font-family: inherit; }
        .close-info:hover { filter: brightness(0.95); }
        .close-info:active { transform: scale(0.96); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin { animation: spin 1s linear infinite; margin-bottom: 12px; }

        @media(max-width: 600px) { 
            .note-card { padding: 16px 12px 12px 16px; margin-bottom: 12px; } 
            .editor-container { padding: 0 16px; }
            .title-input { font-size: 26px; }
            .editor-footer { flex-direction: column; gap: 16px; align-items: flex-start; }
            .save-btn { width: 100%; }
            .word-count { width: 100%; text-align: center; margin-bottom: 4px; }
        }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="island-wrapper" id="islandWrapper">
        <div class="control-island" id="dynamicIsland">
            
            <div class="island-scroll" id="islandScroll">
                
                <div class="search-module" id="searchContainer">
                    <button class="btn-island-icon search-btn" onclick="openSearch(event)" title="Cari Catatan">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </button>
                    <input type="text" id="searchInput" placeholder="Cari catatan..." autocomplete="off" oninput="window.currentPage=1; renderNotes()">
                    <button class="btn-island-icon close-btn" id="closeSearchBtn" onclick="closeSearch(event)" title="Tutup Pencarian">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                    </button>
                </div>
                
                <div class="filter-module" id="dynamicFilters">
                    </div>

            </div>

        </div>
    </div>

    <div class="grid-wrapper">
        <div class="notes-list" id="notesList">
            <div style="grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 40vh; color: var(--text-muted);">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="spin"><path d="M21 12a9 9 0 1 1-6.219-8.56"></path></svg>
                <div style="font-weight: 700; font-size: 14px;">Memuat data...</div>
            </div>
        </div>
        <div id="paginationContainer" class="pagination-container"></div>
    </div>

    <button class="fab" onclick="openEditor()">+</button>

    <div class="editor" id="editor">
        <div class="editor-header">
            <div class="editor-left">
                <button class="icon-btn" onclick="closeEditor()">✕</button>
                <button class="icon-btn disabled" id="btnUndo" onclick="handleUndo()" title="Undo (Ctrl+Z)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7v6h6"></path><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"></path></svg>
                </button>
                <button class="icon-btn disabled" id="btnRedo" onclick="handleRedo()" title="Redo (Ctrl+Y)">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 7v6h-6"></path><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"></path></svg>
                </button>
                <div class="auto-save" id="autoSaveStatus">Tersimpan ✓</div>
            </div>
            <div class="editor-right">
                <button class="icon-btn" onclick="togglePin()" id="pinBtn" title="Sematkan">📌</button>
                <div class="dropdown-wrap">
                    <button class="icon-btn" onclick="toggleDropdown(event, 'actionMenu')">⋮</button>
                    <div class="dropdown-menu" id="actionMenu">
                        <button onclick="showInfo()">ℹ️ Detail Info</button>
                        <button onclick="exportTXT()">📄 Export .txt</button>
                        <hr style="border: 0; border-top: 1px solid var(--border); margin: 4px 0;">
                        <button id="btnTrash" onclick="softDeleteNote()" style="color: var(--danger);">🗑 Hapus ke Trash</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="editor-body">
            <div class="editor-container">
