<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Planner.io - Creative</title>

    <link rel="stylesheet" href="../navbar/navbar.css">
    <link rel="manifest" href="../manifest.json">
    <meta name="theme-color" content="#2563eb">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        *::-webkit-scrollbar { display: none; }
        :root { --bg-grad: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); --card-glass: rgba(255, 255, 255, 0.9); --card-solid: #ffffff; --card-tint: #f1f5f9; --border: #e2e8f0; --text-main: #0f172a; --text-muted: #64748b; --primary: #2563eb; --primary-grad: linear-gradient(135deg, #3b82f6, #2563eb); --primary-soft: rgba(37, 99, 235, 0.1); --success: #16a34a; --danger: #ef4444; --warning: #f59e0b; --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.04); --radius-btn: 14px; --radius-card: 24px; }
        body.dark { --bg-grad: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); --card-glass: rgba(30, 41, 59, 0.9); --card-solid: #1e293b; --card-tint: #0f172a; --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8; --primary-soft: rgba(59, 130, 246, 0.2); --shadow-flat: 0 4px 20px rgba(0, 0, 0, 0.2); }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-grad); color: var(--text-main); min-height: 100vh; padding: 86px 16px 100px; transition: background 0.3s, color 0.3s; }
        
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -50px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: 100px; right: -100px; }
        
        .wrapper { position: relative; z-index: 2; max-width: 1200px; margin: 0 auto; }
        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 16px; }
        .header-title h1 { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        .header-title p { font-size: 13px; color: var(--text-muted); margin-top: 4px; line-height: 1.6; }
        
        .btn-add-board { background: var(--primary-grad); color: white; border: none; padding: 12px 20px; border-radius: var(--radius-btn); font-size: 13px; font-weight: 800; cursor: pointer; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.3); transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .btn-add-board:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(37, 99, 235, 0.4); }
        
        .board-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-items: start; }
        .board-card { background: var(--card-glass); backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-card); padding: 20px; box-shadow: var(--shadow-flat); display: flex; flex-direction: column; transition: 0.2s; min-width: 0; }
        .board-card:hover { border-color: #cbd5e1; }
        .board-top { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 20px; }
        .board-title { font-size: 16px; font-weight: 800; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
        .board-actions { display: flex; align-items: center; gap: 8px; }
        
        .counter { background: var(--primary-soft); color: var(--primary); padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: 800; white-space: nowrap; border: 1px solid var(--border); }
        .btn-del-board { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: none; width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .btn-del-board:hover { background: var(--danger); color: white; }
        
        .form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
        .input-wrap { position: relative; }
        .input-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 12px; font-weight: 800; color: var(--text-muted); pointer-events: none; }
        .input-wrap input { width: 100%; border: 1px solid var(--border); background: var(--card-solid); border-radius: 14px; color: var(--text-main); padding: 12px 14px 12px 80px; font-size: 13px; font-weight: 600; outline: none; transition: 0.2s; }
        .input-wrap input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .add-btn { border: none; background: var(--card-tint); color: var(--text-main); border: 1px solid var(--border); padding: 12px; border-radius: 14px; font-size: 13px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .add-btn:hover { background: var(--primary-soft); color: var(--primary); border-color: var(--primary); }
        
        .list { display: flex; flex-direction: column; gap: 12px; max-height: 50vh; overflow-y: auto; padding-right: 4px; }
        .list::-webkit-scrollbar { display: none; }
        
        /* ITEM PLANNER - Layout Card Flexibel & Presisi */
        .item { background: var(--card-solid); border: 1px solid var(--border); border-radius: 16px; padding: 16px; display: flex; flex-direction: column; transition: 0.2s; min-width: 0; }
        
        /* Baris 1: Judul dan Action Button yang Sejajar secara horizontal */
        .item-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .item-title { font-size: 14px; font-weight: 800; line-height: 1.4; word-break: break-word; color: var(--text-main); flex: 1; }
        .right-actions { display: flex; gap: 6px; flex-shrink: 0; }
        
        .btn-icon { width: 32px; height: 32px; border-radius: 10px; cursor: pointer; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; transition: 0.2s; background: var(--card-solid); font-size: 14px; }
        .btn-edit { color: var(--text-muted); }
        .btn-edit:hover { background: var(--card-tint); color: var(--primary); border-color: var(--primary); }
        .btn-done { color: var(--border); font-size: 16px; }
        .btn-done.active { background: var(--success); border-color: var(--success); color: white; }
        .btn-del { color: var(--danger); }
        .btn-del:hover { background: var(--danger); color: white; border-color: var(--danger); }
        
        /* Baris 2: Badge (Horizontal scrollable overflow agar tidak turun/merusak card) */
        .item-badges { display: flex; gap: 6px; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 2px; margin-top: 8px; margin-bottom: 8px; }
        .item-badges::-webkit-scrollbar { display: none; }
        
        .badge { display: inline-flex; align-items: center; gap: 4px; background: var(--card-tint); color: var(--text-muted); border: 1px solid var(--border); padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; white-space: nowrap; flex-shrink: 0; }
        .badge.restored { background: var(--warning); color: white; border: none; }

        /* Baris 3: Link Box */
        .link-box { width: 100%; overflow-x: auto; background: var(--primary-soft); color: var(--primary); border-radius: 10px; padding: 10px 12px; font-size: 12px; font-weight: 700; white-space: nowrap; cursor: text; border: 1px dashed rgba(37, 99, 235, 0.3); }
        .link-box::-webkit-scrollbar { display: none; }
        
        .completed { opacity: 0.5; }
        .completed .item-title { text-decoration: line-through; }
        
        .empty-board { text-align: center; padding: 20px; font-size: 12px; font-weight: 600; color: var(--text-muted); }
        .empty-state-global { grid-column: 1 / -1; text-align: center; padding: 60px 20px; background: var(--card-glass); border: 1px dashed var(--border); border-radius: var(--radius-card); color: var(--text-muted); font-size: 14px; font-weight: 600; }
        
        /* Modal Style */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-card { background: var(--card-solid); width: 100%; max-width: 360px; border-radius: var(--radius-card); padding: 24px; box-shadow: var(--shadow-flat); border: 1px solid var(--border); }
        .modal-card h3 { font-size: 18px; font-weight: 900; margin-bottom: 8px; color: var(--text-main); }
        .modal-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; line-height: 1.5; }
        .modal-input { width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid var(--border); background: var(--card-tint); color: var(--text-main); font-size: 14px; font-weight: 600; outline: none; margin-bottom: 12px; transition: 0.2s; }
        .modal-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
        .btn-modal { flex: 1; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 800; cursor: pointer; border: none; transition: 0.2s; }
        .btn-cancel { background: var(--card-tint); color: var(--text-main); border: 1px solid var(--border); }
        .btn-cancel:hover { background: #e2e8f0; }
        body.dark .btn-cancel:hover { background: #334155; }
        .btn-confirm { background: var(--primary-grad); color: white; }
        .btn-confirm:hover { opacity: 0.9; }
        
        @media(max-width: 600px) { .page-header { flex-direction: column; align-items: flex-start; } .btn-add-board { width: 100%; justify-content: center; } .board-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="navbar-container"></div>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="page-header">
            <div class="header-title">
                <h1>Planner Workspace</h1>
                <p>Atur jadwal rilis dan ide konten untuk semua channel Anda di sini.</p>
            </div>
            <button class="btn-add-board" onclick="openAddBoardModal()">
                <span style="font-size:16px;">+</span> Buat Papan Channel
            </button>
        </div>

        <div class="board-container" id="boardContainer"></div>
    </div>

    <!-- MODAL BUAT PAPAN -->
    <div class="modal-overlay" id="addBoardModal">
        <div class="modal-card">
            <h3>Buat Papan Baru</h3>
            <p>Masukkan nama channel atau kategori papan yang ingin Anda buat.</p>
            <input type="text" class="modal-input" id="boardNameInput" placeholder="Misal: YouTube Gaming, TikTok...">
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeAddBoardModal()">Batal</button>
                <button class="btn-modal btn-confirm" onclick="confirmAddBoard()">Buat Papan</button>
            </div>
        </div>
    </div>

    <!-- MODAL EDIT IDE -->
    <div class="modal-overlay" id="editIdeaModal">
        <div class="modal-card">
            <h3>Edit Ide Konten</h3>
            <div class="input-wrap" style="margin-bottom:12px;">
                <span>Konten</span><input type="text" id="editTitleInput" placeholder="Judul ide...">
            </div>
            <div class="input-wrap" style="margin-bottom:12px;">
                <span>Tanggal</span><input type="text" id="editDateInput" placeholder="Misal: 17 Agustus 1945">
            </div>
            <div class="input-wrap" style="margin-bottom:12px;">
                <span>Link</span><input type="url" id="editLinkInput" placeholder="Tautan referensi...">
            </div>
            <div class="modal-actions">
                <button class="btn-modal btn-cancel" onclick="closeEditModal()">Batal</button>
                <button class="btn-modal btn-confirm" onclick="saveEdit()">Simpan</button>
            </div>
        </div>
    </div>

 <!--    <script>

        function openEditModal(ideaId) {

        function closeEditModal() {

        function saveEdit() {
            if(!editCurrentId) return;
            const idea = ideas.find(i => i.id === editCurrentId);
            const newTitle = document.getElementById('editTitleInput').value.trim();
            const newDate = document.getElementById('editDateInput').value.trim();
            const newLink = document.getElementById('editLinkInput').value.trim() || "-";

                return alert("Judul dan Tanggal wajib diisi!");

            idea.title = newTitle;
            idea.date = newDate;
            idea.link = newLink;
            saveToLocal();
            closeEditModal();
        }

        function toggleDone(ideaId) {
            const idea = ideas.find(i => i.id === ideaId);
            if(idea) { idea.done = !idea.done; saveToLocal(); }
        }

        function deleteIdea(ideaId) {
            if (confirm("Pindahkan ide ini ke tempat sampah?")) {
                const idea = ideas.find(i => i.id === ideaId);
                if (idea) {
                    let trashData = JSON.parse(localStorage.getItem('creative_trash')) || [];
                    const now = Date.now();
                    trashData.push({
                        id: 'trash_' + now, originalId: idea.id, type: 'planner', title: idea.title,
                        content: `Tgl: ${idea.date} | Link: ${idea.link}`, uid: "local_user",
                        deletedAt: now, expireAt: now + (30 * 24 * 60 * 60 * 1000)
                    });
                    localStorage.setItem('creative_trash', JSON.stringify(trashData));
                    ideas = ideas.filter(i => i.id !== ideaId);
                    saveToLocal();
                }
            }
        }

        function selectText(el) {
            const range = document.createRange(); range.selectNodeContents(el);
            const selection = window.getSelection(); selection.removeAllRanges(); selection.addRange(range);
        }

        function renderWorkspace() {
            const container = document.getElementById("boardContainer");

                                displayLink = parts[1].trim();
                            } else {
                                displayDate = "Dipulihkan";
                            }
                        }

                        // Render Card Item Modern + Edit Button
                        listHtml += `<div class="item ${item.done ? "completed" : ""}">

                        </div>`;

                html += `<div class="board-card">
