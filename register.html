    <a href="./index.html" class="btn-back-floating" title="Kembali ke Halaman Utama">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>
    <div class="bg-wrapper">
        <div class="bg-glow one"></div>
        <div class="bg-glow two"></div>
    </div>
    <section class="auth-container">
        <a href="./index.html" class="btn-back-mobile" title="Kembali">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            Kembali ke Utama
        </a>
        <div class="auth-header">
            <div class="brand-logo">
                <img src="./assets/logo.png" alt="Creative.io" onerror="this.style.display='none'; this.parentElement.innerHTML='✨';">
            </div>
            <h1 class="auth-title">Daftar Akun Baru</h1>
            <p class="auth-subtitle">Buat akun untuk menggunakan workspace kreatif modern Creative.io.</p>
        </div>
        <div id="alertBox" class="alert-box">
            <span id="alertIcon"></span>
            <span id="alertText"></span>
        </div>
        <form id="registerForm">
            <div class="input-group">
                <label class="input-label" for="name">Nama Lengkap</label>
                <input type="text" id="name" class="auth-input" placeholder="Misal: John Doe" required autocomplete="name" oninput="hideAlert()">
            </div>
            <div class="input-group">
                <label class="input-label" for="email">Email</label>
                <input type="email" id="email" class="auth-input" placeholder="contoh@email.com" required autocomplete="email" oninput="hideAlert()">
            </div>
            <div class="input-group">
                <label class="input-label" for="password">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="auth-input" placeholder="Minimal 6 karakter" required autocomplete="new-password" oninput="hideAlert()">
                    <button type="button" class="toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()" title="Tampilkan Password">👁️</button>
                </div>
            </div>
            <button type="submit" class="auth-btn" id="registerBtn">
                <span class="spinner"></span>
                <span id="btnText">Buat Akun Gratis</span>
            </button>
        </form>
        <div class="auth-footer">
            Sudah punya akun? <a href="./login.html">Masuk di sini</a>
        </div>
    </section>
