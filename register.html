<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Creative.io</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <style>
        /* MASUKKAN CSS LAMA ANDA DI SINI */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }
        .auth-wrapper { position: relative; z-index: 2; width: 100%; max-width: 440px; }
        .auth-card { width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 42px 36px; backdrop-filter: blur(24px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .logo-box { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
        .title { font-size: 28px; font-weight: 900; text-align: center; letter-spacing: -0.5px; margin-bottom: 12px; color: #0f172a; }
        .subtitle { font-size: 14px; line-height: 1.6; text-align: center; color: #64748b; margin-bottom: 28px; padding: 0 10px; }
        .alert { display: none; padding: 12px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 18px; text-align: center; }
        .alert.success { display: block; background: rgba(34, 197, 94, 0.1); color: #15803d; border: 1px solid rgba(34, 197, 94, 0.2); }
        .alert.error { display: block; background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
        .form-group { margin-bottom: 18px; position: relative; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .input { width: 100%; height: 52px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0 18px; font-size: 14px; color: #0f172a; outline: none; transition: all 0.2s ease; }
        .input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .submit-btn { width: 100%; height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; margin-top: 10px; }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .auth-info { margin-top: 24px; text-align: center; font-size: 13px; color: #64748b; }
        .auth-info a { color: #2563eb; text-decoration: none; font-weight: 700; }
        
        /* CSS TAMBAHAN UNTUK IKON MATA */
        .pwd-toggle { position: absolute; right: 16px; top: 38px; cursor: pointer; opacity: 0.6; font-size: 16px; transition: 0.2s; user-select: none; }
        .pwd-toggle:hover { opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <section class="auth-wrapper">
        <div class="auth-card">
            <div class="logo"><div class="logo-box"><img src="assets/logo.png" alt="Creative.io"></div></div>
            <h1 class="title">Daftar Akun Baru</h1>
            <p class="subtitle">Buat akun untuk menggunakan workspace kreatif modern Creative.io.</p>
            <div id="alertBox" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="label">Nama Lengkap</label>
                    <input type="text" id="name" class="input" required autocomplete="name">
                </div>
                <div class="form-group">
                    <label class="label">Email</label>
                    <input type="email" id="email" class="input" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="label">Password</label>
                    <input type="password" id="password" class="input" placeholder="Minimal 6 karakter" required>
                    <span class="pwd-toggle" onclick="togglePwd('password', this)">👁️</span>
                </div>
                <button type="submit" class="submit-btn" id="registerBtn">Buat Akun Gratis</button>
            </form>
            <div class="auth-info">Sudah punya akun? <a href="login.html">Masuk di sini</a></div>
        </div>
    </section>

    <script>
        function togglePwd(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") { input.type = "text"; el.innerText = "🙈"; } 
            else { input.type = "password"; el.innerText = "👁️"; }
        }
    </script>
    <script src="./js/pwa.js"></script>
    
    <script type="module">
        import { auth } from "./js/firebase.js";
        import { createUserWithEmailAndPassword, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const form = document.getElementById("registerForm");
        const alertBox = document.getElementById("alertBox");
        const btn = document.getElementById("registerBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btn.disabled = true; btn.innerText = "Membuat akun..."; alertBox.style.display = "none";
            
            const name = document.getElementById("name").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;

            try {
                // Buat Akun Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                // Update Nama Profil
                await updateProfile(userCredential.user, { displayName: name });
                // Force Logout agar user login ulang secara manual sesuai instruksi
                await signOut(auth);

                alertBox.className = "alert success";
                alertBox.innerText = "Akun berhasil dibuat! Silakan login.";
                setTimeout(() => { window.location.replace("./login.html"); }, 1500);
            } catch (error) {
                alertBox.className = "alert error";
                alertBox.innerText = "Gagal: " + error.message;
                btn.disabled = false; btn.innerText = "Buat Akun Gratis";
            }
        });
    </script>
</body>
</html>
