<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Creative.io</title>

    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <style>
        /* =========================================================
           CSS UTAMA (Dipertahankan 100% Sesuai Desain Anda)
        ========================================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }
        .auth-wrapper { position: relative; z-index: 2; width: 100%; max-width: 440px; }
        .auth-card { width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 42px 36px; backdrop-filter: blur(24px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .logo-box { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
        .title { font-size: 28px; font-weight: 900; text-align: center; letter-spacing: -0.5px; margin-bottom: 12px; color: #0f172a; }
        .title span { color: #2563eb; }
        .subtitle { font-size: 14px; line-height: 1.6; text-align: center; color: #64748b; margin-bottom: 28px; padding: 0 10px; }
        
        .alert { display: none; padding: 12px 16px; border-radius: 14px; font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 18px; text-align: center; }
        .alert.success { display: block; background: rgba(34, 197, 94, 0.1); color: #15803d; border: 1px solid rgba(34, 197, 94, 0.15); }
        .alert.error { display: block; background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.15); }
        
        .form-group { margin-bottom: 18px; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .input { width: 100%; height: 52px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0 18px; font-size: 14px; color: #0f172a; outline: none; transition: all 0.2s ease; }
        .input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input::placeholder { color: #94a3b8; }
        .submit-btn { width: 100%; height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; margin-top: 10px; }
        .submit-btn:hover { transform: translateY(-2px); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .auth-info { margin-top: 24px; text-align: center; font-size: 13px; color: #64748b; }
        .auth-info a { color: #2563eb; text-decoration: none; font-weight: 700; margin-left: 4px; }
        .auth-info a:hover { text-decoration: underline; }

        /* =========================================================
           TAMBAHAN: POSISI EYE ICON (MATA PASSWORD REGISTER)
        ========================================================= */
        .password-container { position: relative; width: 100%; }
        .password-container .input { padding-right: 50px; }
        .toggle-password { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 18px; cursor: pointer; color: #94a3b8; user-select: none; display: flex; align-items: center; justify-content: center; height: 100%; padding: 0 4px; }
        .toggle-password:hover { color: #64748b; }

        @media(max-width: 600px) { body { padding: 16px; } .auth-card { padding: 40px 24px; border-radius: 28px; } .title { font-size: 26px; } }
    </style>
</head>
<body>

    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <section class="auth-wrapper">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-box">
                    <img src="./assets/logo.png" alt="Creative.io" onerror="this.style.display='none'; this.parentElement.innerHTML='✨';">
                </div>
            </div>

            <h1 class="title">Daftar Akun Baru</h1>
            <p class="subtitle">Buat akun untuk menggunakan workspace kreatif modern Creative.io.</p>

            <div id="alertBox" class="alert"></div>

            <form id="registerForm">
                <div class="form-group">
                    <label class="label">Nama Lengkap</label>
                    <input type="text" id="name" class="input" placeholder="Misal: John Doe" required autocomplete="name">
                </div>

                <div class="form-group">
                    <label class="label">Email</label>
                    <input type="email" id="email" class="input" placeholder="contoh@email.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label class="label">Password</label>
                    <div class="password-container">
                        <input type="password" id="password" class="input" placeholder="Minimal 6 karakter" required autocomplete="new-password">
                        <button type="button" class="toggle-password" id="eyeIcon" onclick="togglePasswordVisibility()">👁️</button>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="registerBtn">Buat Akun Gratis</button>
            </form>

            <div class="auth-info">
                Sudah punya akun? <a href="./login.html">Masuk di sini</a>
            </div>
        </div>
    </section>

    <!-- Pendaftaran PWA / Service Worker -->
    <script src="./js/pwa.js"></script>

    <script type="module">
        // SAKELAR INTEGRASI UTAMA
        const USE_FIREBASE = true;

        let auth, createUserWithEmailAndPassword, updateProfile, signOut;
        
        if (USE_FIREBASE) {
            try {
                const firebaseModule = await import("./js/firebase.js");
                auth = firebaseModule.auth;
                const authLibrary = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
                createUserWithEmailAndPassword = authLibrary.createUserWithEmailAndPassword;
                updateProfile = authLibrary.updateProfile;
                signOut = authLibrary.signOut;

                // PROTEKSI REDIRECT JIKA USER SUDAH LOGGED IN
                authLibrary.onAuthStateChanged(auth, (user) => {
                    if (user) {
                        window.location.replace("./pages/dashboard.html");
                    }
                });
            } catch (err) {
                console.error("Gagal memuat pustaka Firebase Auth:", err);
            }
        } else {
            // Fallback Redirect Status Lokal
            if (localStorage.getItem('dummy_logged_in') === 'true') {
                window.location.replace("./pages/dashboard.html");
            }
        }

        const form = document.getElementById("registerForm");
        const alertBox = document.getElementById("alertBox");
        const registerBtn = document.getElementById("registerBtn");

        function showAlert(type, message) {
            alertBox.className = "alert " + type;
            alertBox.innerText = message;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            alertBox.style.display = "none";
            registerBtn.disabled = true;
            registerBtn.innerText = "Membuat akun...";

            const nameVal = document.getElementById("name").value.trim();
            const emailVal = document.getElementById("email").value.trim();
            const passwordVal = document.getElementById("password").value;

            if (USE_FIREBASE) {
                // =========================================================
                // LOGIKA TERINTEGRASI FIREBASE CLOUD SECURE SIGNUP
                // =========================================================
                try {
                    // 1. Buat Kredensial Pengguna Baru di Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, emailVal, passwordVal);
                    
                    // 2. Tanamkan Nama Lengkap ke Dalam Data DisplayName Profile Auth
                    await updateProfile(userCredential.user, { displayName: nameVal });
                    
                    // 3. FORCE LOGOUT: Agar user diarahkan untuk login manual di halaman login.html
                    await signOut(auth);

                    showAlert("success", "Akun Anda berhasil didaftarkan! Mengalihkan ke halaman login...");
                    setTimeout(() => { 
                        window.location.replace("./login.html"); 
                    }, 1800);

                } catch (error) {
                    registerBtn.disabled = false;
                    registerBtn.innerText = "Buat Akun Gratis";
                    
                    // Terjemahkan Firebase Error Code
                    let errorMessage = "Pendaftaran Gagal: " + error.message;
                    if (error.code === "auth/email-already-in-use") errorMessage = "Alamat email ini sudah terdaftar. Silakan gunakan email lain atau masuk.";
                    if (error.code === "auth/weak-password") errorMessage = "Kata sandi terlalu lemah. Gunakan minimal 6 karakter kombinasi.";
                    if (error.code === "auth/invalid-email") errorMessage = "Format alamat email tidak valid.";
                    if (error.code === "auth/operation-not-allowed") errorMessage = "Metode Email/Password dinonaktifkan di Firebase Console.";

                    showAlert("error", errorMessage);
                }
            } else {
                // =========================================================
                // LOGIKA CADANGAN TESTING OFFLINE LOCALSTORAGE
                // =========================================================
                setTimeout(() => {
                    showAlert("success", "Mode Lokal: Akun berhasil disimulasikan! Mengalihkan...");
                    localStorage.setItem('creative_user_profile', JSON.stringify({
                        name: nameVal, photo: null
                    }));
                    setTimeout(() => { 
                        window.location.replace("./login.html"); 
                    }, 1200);
                }, 1000);
            }
        });

        // =========================================================
        // TAMBAHAN INTERAKTIF UI: SHOW / HIDE PASSWORD
        // =========================================================
        window.togglePasswordVisibility = function() {
            const passwordInput = document.getElementById("password");
            const eyeIcon = document.getElementById("eyeIcon");
            
            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                eyeIcon.innerText = "🙈";
                eyeIcon.setAttribute("title", "Sembunyikan Kata Sandi");
            } else {
                passwordInput.type = "password";
                eyeIcon.innerText = "👁️";
                eyeIcon.setAttribute("title", "Tampilkan Kata Sandi");
            }
        }
    </script>
</body>
</html>
