<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Creative.io</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <style>
        /* MASUKKAN CSS LAMA ANDA DI SINI. SAMA SEPERTI REGISTER */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); display: flex; align-items: center; justify-content: center; padding: 24px; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }
        .login-wrapper { position: relative; z-index: 2; width: 100%; max-width: 440px; }
        .login-card { width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 48px 36px; backdrop-filter: blur(24px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 34px; }
        .logo-box { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 28px; height: 28px; filter: brightness(0) invert(1); }
        .logo-text { font-size: 26px; font-weight: 900; } .logo-text span { color: #2563eb; }
        .title { font-size: 32px; font-weight: 900; text-align: center; margin-bottom: 12px; }
        .subtitle { font-size: 14px; text-align: center; color: #64748b; margin-bottom: 34px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; }
        .input { width: 100%; height: 52px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0 18px; outline: none; }
        .options { display: flex; justify-content: space-between; margin-bottom: 28px; font-size: 13px; }
        .forgot { font-weight: 700; color: #2563eb; text-decoration: none; }
        .login-btn { width: 100%; height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-weight: 700; cursor: pointer; }
        .footer { margin-top: 28px; text-align: center; font-size: 13px; color: #64748b; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 700; }
        .alert { display: none; padding: 12px; border-radius: 12px; font-size: 13px; font-weight: 600; margin-bottom: 18px; text-align: center; }
        .alert.error { display: block; background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.2); }
        .pwd-toggle { position: absolute; right: 16px; top: 38px; cursor: pointer; opacity: 0.6; font-size: 16px; user-select: none; }
    </style>
</head>
<body>
    <div class="bg-glow one"></div><div class="bg-glow two"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo"><div class="logo-box"><img src="assets/logo.png" alt="Creative.io"></div><div class="logo-text">Creative<span>.io</span></div></div>
            <h1 class="title">Selamat Datang</h1>
            <p class="subtitle">Masuk untuk mengakses workspace Anda.</p>
            <div id="alertBox" class="alert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="label">Email</label>
                    <input type="email" class="input" id="email" required>
                </div>
                <div class="form-group">
                    <label class="label">Password</label>
                    <input type="password" class="input" id="password" required>
                    <span class="pwd-toggle" onclick="togglePwd('password', this)">👁️</span>
                </div>
                <div class="options">
                    <label><input type="checkbox" id="rememberMe"> Ingat saya</label>
                    <a href="forgot-password.html" class="forgot">Lupa password?</a>
                </div>
                <button type="submit" class="login-btn" id="loginBtn">Masuk ke Workspace</button>
            </form>
            <div class="footer">Belum punya akun? <a href="register.html">Daftar gratis</a></div>
        </div>
    </div>

    <script>
        function togglePwd(id, el) {
            const input = document.getElementById(id);
            if (input.type === "password") { input.type = "text"; el.innerText = "🙈"; } 
            else { input.type = "password"; el.innerText = "👁️"; }
        }
    </script>
    <script src="./js/pwa.js"></script>

    <script type="module">
        import { auth } from "./js/firebase.js";
        import { signInWithEmailAndPassword, onAuthStateChanged, setPersistence, browserLocalPersistence, browserSessionPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        // Mencegah user yang sudah login mengakses halaman login
        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace("./pages/dashboard.html");
        });

        const form = document.getElementById("loginForm");
        const alertBox = document.getElementById("alertBox");
        const btn = document.getElementById("loginBtn");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            btn.disabled = true; btn.innerText = "Memproses..."; alertBox.style.display = "none";
            
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const remember = document.getElementById("rememberMe").checked;

            try {
                // Set durasi session
                const persistenceType = remember ? browserLocalPersistence : browserSessionPersistence;
                await setPersistence(auth, persistenceType);
                
                // Login
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect diatur otomatis oleh onAuthStateChanged di atas
            } catch (error) {
                alertBox.className = "alert error";
                alertBox.innerText = "Email atau Password salah!";
                btn.disabled = false; btn.innerText = "Masuk ke Workspace";
            }
        });
    </script>
</body>
</html>
