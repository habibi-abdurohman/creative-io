<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Creative.io</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <style>
        /* [CSS TETAP SAMA] */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }
        .login-wrapper { position: relative; z-index: 2; width: 100%; max-width: 440px; }
        .login-card { width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 48px 36px; backdrop-filter: blur(24px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .logo { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 34px; }
        .logo-box { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; }
        .logo-box img { width: 28px; height: 28px; object-fit: contain; filter: brightness(0) invert(1); }
        .logo-text { font-size: 26px; font-weight: 900; letter-spacing: -0.5px; }
        .logo-text span { color: #2563eb; }
        .title { font-size: 32px; font-weight: 900; text-align: center; line-height: 1.15; letter-spacing: -1px; margin-bottom: 12px; }
        .subtitle { font-size: 14px; line-height: 1.6; text-align: center; color: #64748b; margin-bottom: 34px; padding: 0 10px; }
        .form-group { margin-bottom: 20px; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .input { width: 100%; height: 52px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0 18px; font-size: 14px; color: #0f172a; outline: none; transition: all 0.2s ease; }
        .input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .options { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 28px; }
        .remember { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #64748b; cursor: pointer; }
        .remember input { width: 16px; height: 16px; accent-color: #2563eb; cursor: pointer; }
        .forgot { text-decoration: none; font-size: 13px; font-weight: 700; color: #2563eb; transition: color 0.2s; }
        .forgot:hover { color: #1d4ed8; }
        .login-btn { width: 100%; height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; }
        .login-btn:hover { transform: translateY(-2px); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .login-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .footer { margin-top: 28px; text-align: center; font-size: 13px; color: #64748b; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 700; margin-left: 4px; }
        .footer a:hover { text-decoration: underline; }
        @media(max-width: 600px) { body { padding: 16px; } .login-card { padding: 40px 24px; border-radius: 28px; } .title { font-size: 28px; } .logo-text { font-size: 24px; } .options { flex-direction: row; } }
    </style>
</head>
<body>

    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="logo">
                <div class="logo-box">
                    <img src="assets/logo.png" alt="Creative.io">
                </div>
                <div class="logo-text">
                    Creative<span>.io</span>
                </div>
            </div>

            <h1 class="title">Selamat Datang</h1>
            <p class="subtitle">Masuk untuk mengakses workspace, planner, dan tools produktivitas Anda.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label class="label">Email</label>
                    <input type="email" class="input" id="email" placeholder="contoh@email.com" required>
                </div>

                <div class="form-group">
                    <label class="label">Password</label>
                    <input type="password" class="input" id="password" placeholder="Masukkan password" required>
                </div>

                <div class="options">
                    <label class="remember">
                        <input type="checkbox" id="rememberMe"> Ingat saya
                    </label>
                    <a href="forgot-password.html" class="forgot">Lupa password?</a>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">Masuk ke Workspace</button>
            </form>

            <div class="footer">
                Belum punya akun? <a href="register.html">Daftar gratis</a>
            </div>
        </div>
    </div>

    <script>
        // Cek jika sedang dalam status simulasi login
        if (localStorage.getItem('dummy_logged_in') === 'true') {
            window.location.replace("pages/dashboard.html");
        }

        document.getElementById("loginForm").addEventListener("submit", (e) => {
            e.preventDefault();
            const loginBtn = document.getElementById("loginBtn");
            loginBtn.innerText = "Memproses...";
            loginBtn.disabled = true;

            // Simulasi proses berhasil
            setTimeout(() => {
                localStorage.setItem('dummy_logged_in', 'true');
                window.location.href = "pages/dashboard.html";
            }, 1000);
        });
    </script>
    <script src="/js/pwa.js"></script>
    </body>
</html>
