<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon-192x192.png">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#2563eb">

    <style>
        /* =========================================================
           CSS UTAMA - DIADAPTASI DARI REGISTER.HTML (UNIFORM DESIGN)
        ========================================================= */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        :root {
            --primary: #2563eb; /* Menjaga kompabilitas inline style accent-color */
        }

        body { 
            font-family: 'Inter', Arial, sans-serif; 
            min-height: 100vh; 
            overflow-x: hidden; 
            background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); 
            color: #0f172a; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            padding: 24px; 
        }

        /* Dukungan Mode Gelap (Opsional & Aman) */
        body.dark { 
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%); 
            color: #f8fafc; 
        }
        body.dark .auth-container {
            background: rgba(30, 41, 59, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }
        body.dark .auth-title { color: #f8fafc; }
        body.dark .input-label { color: #cbd5e1; }
        body.dark .auth-input { background: #1e293b; border-color: #334155; color: #f8fafc; }
        body.dark .auth-input:focus { background: #0f172a; }
        body.dark .auth-options { color: #94a3b8; }

        /* Background Glow Efek dari Register */
        .bg-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        .bg-glow { position: absolute; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }

        /* Kotak Card Adaptasi Penuh dari .auth-card & .auth-wrapper */
        .auth-container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.8);
            border-radius: 32px;
            padding: 42px 36px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Bagian Logo & Judul Utama */
        .auth-header { text-align: center; margin-bottom: 28px; }
        .brand-logo { 
            width: 56px; height: 56px; border-radius: 18px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); 
            display: inline-flex; align-items: center; justify-content: center; overflow: hidden;
            margin-bottom: 24px; 
        }
        .brand-logo img { width: 100%; height: 100%; object-fit: cover; }
        
        .auth-title { font-size: 28px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 12px; color: #0f172a; text-align: center; }
        .auth-subtitle { font-size: 14px; line-height: 1.6; text-align: center; color: #64748b; margin-bottom: 28px; padding: 0 10px; }

        /* Desain Struktur Form & Field Input */
        .input-group { margin-bottom: 18px; }
        .input-label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; text-align: left; }
        
        .auth-input { 
            width: 100%; height: 52px; background: #f8fafc; 
            border: 1px solid #e2e8f0; border-radius: 16px; 
            padding: 0 18px; font-size: 14px; color: #0f172a; 
            outline: none; transition: all 0.2s ease; 
            font-family: inherit;
        }
        .auth-input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .auth-input::placeholder { color: #94a3b8; }
        
        /* Modul Fitur Mata / Sembunyikan Password */
        .password-wrapper { position: relative; width: 100%; }
        .password-wrapper .auth-input { padding-right: 50px; }
        .toggle-password { 
            position: absolute; right: 18px; top: 50%; transform: translateY(-50%); 
            background: none; border: none; font-size: 18px; cursor: pointer; 
            color: #94a3b8; user-select: none; display: flex; align-items: center; 
            justify-content: center; height: 100%; padding: 0 4px; 
        }
        .toggle-password:hover { color: #64748b; }

        /* Opsi Tambahan Form Login (Remember Me & Forgot) */
        .auth-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 13px; font-weight: 600; color: #64748b; }
        .forgot-link { color: #2563eb; text-decoration: none; font-weight: 700; transition: 0.2s; }
        .forgot-link:hover { text-decoration: underline; }

        /* Kotak Error Meniru Persis Alert Style Red Register */
        .error-box { 
            display: none; padding: 12px 16px; border-radius: 14px; 
            font-size: 13px; font-weight: 600; line-height: 1.5; 
            margin-bottom: 18px; text-align: center;
            background: rgba(239, 68, 68, 0.1); color: #dc2626; 
            border: 1px solid rgba(239, 68, 68, 0.15);
            align-items: center; justify-content: center; gap: 8px;
            animation: shake 0.4s ease; 
        }
        .error-box.show { display: flex; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25%, 75% { transform: translateX(-5px); } 50% { transform: translateX(5px); } }

        /* Tombol Utama */
        .auth-btn { 
            width: 100%; height: 52px; border: none; border-radius: 16px; 
            background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; 
            font-size: 15px; font-weight: 700; cursor: pointer; 
            transition: all 0.2s ease; margin-top: 10px;
            display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .auth-btn:hover { transform: translateY(-2px); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .auth-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

        /* Footer Keterangan Pindah Halaman */
        .auth-footer { margin-top: 24px; text-align: center; font-size: 13px; color: #64748b; }
        .auth-footer a { color: #2563eb; text-decoration: none; font-weight: 700; margin-left: 4px; }
        .auth-footer a:hover { text-decoration: underline; }

        /* Indikator Loading Mekanik Ringan */
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; display: none; }
        .auth-btn.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsivitas Media Query Mobile */
        @media(max-width: 600px) { 
            body { padding: 16px; } 
            .auth-container { padding: 40px 24px; border-radius: 28px; } 
            .auth-title { font-size: 26px; } 
        }
    </style>
</head>
<body>

    <div class="bg-wrapper">
        <div class="bg-glow one"></div>
        <div class="bg-glow two"></div>
    </div>

    <div class="auth-container">
        <div class="auth-header">
            <div class="brand-logo">
                <img src="./assets/logo.png" alt="Logo" onerror="this.style.display='none'; this.parentElement.innerHTML='✨';">
            </div>
            <h1 class="auth-title">Selamat Datang</h1>
            <p class="auth-subtitle">Masuk ke workspace kreatif Anda.</p>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label class="input-label" for="emailInput">Email</label>
                <input type="email" id="emailInput" class="auth-input" placeholder="nama@email.com" required autocomplete="email" oninput="hideError()">
            </div>
            
            <div class="input-group">
                <label class="input-label" for="passwordInput">Password</label>
                <div class="password-wrapper">
                    <input type="password" id="passwordInput" class="auth-input" placeholder="Masukkan password Anda" required autocomplete="current-password" oninput="hideError()">
                    <button type="button" class="toggle-password" onclick="togglePassword()" title="Tampilkan Password">👁️</button>
                </div>
            </div>

            <div class="auth-options">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                    <input type="checkbox" id="rememberMe" style="accent-color: var(--primary);"> Ingat saya
                </label>
                <a href="./forgot-password.html" class="forgot-link">Lupa Password?</a>
            </div>

            <div id="errorBox" class="error-box">
                <span class="error-icon">⚠️</span>
                <span id="errorText">Password yang Anda masukkan salah.</span>
            </div>

            <button type="submit" id="loginBtn" class="auth-btn">
                <span class="spinner"></span>
                <span id="btnText">Masuk Sekarang</span>
            </button>
        </form>

        <div class="auth-footer">
            Belum punya akun? <a href="./register.html">Daftar Gratis</a>
        </div>
    </div>

    <script src="./js/pwa.js"></script>
    
    <script type="module">
        const USE_FIREBASE = true; 

        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem("dashboard_theme") === "dark") document.body.classList.add("dark");
            
            const savedEmail = localStorage.getItem("creative_remembered_email");
            if(savedEmail) {
                document.getElementById('emailInput').value = savedEmail;
                document.getElementById('rememberMe').checked = true;
            }
        });

        window.togglePassword = function() {
            const pwdInput = document.getElementById('passwordInput');
            pwdInput.type = pwdInput.type === "password" ? "text" : "password";
        }

        window.hideError = function() {
            document.getElementById('errorBox').classList.remove('show');
        }

        function showError(message) {
            const errorBox = document.getElementById('errorBox');
            document.getElementById('errorText').innerText = message;
            errorBox.classList.remove('show');
            void errorBox.offsetWidth; 
            errorBox.classList.add('show');
        }

        function setLoading(isLoading) {
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            btn.disabled = isLoading;
            if (isLoading) {
                btn.classList.add('loading');
                btnText.innerText = "Memeriksa...";
            } else {
                btn.classList.remove('loading');
                btnText.innerText = "Masuk Sekarang";
            }
        }

        window.handleLogin = async function(e) {
            e.preventDefault(); 
            hideError();
            setLoading(true);

            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const rememberMe = document.getElementById('rememberMe').checked;

            if (rememberMe) localStorage.setItem("creative_remembered_email", email);
            else localStorage.removeItem("creative_remembered_email");

            if (USE_FIREBASE) {
                try {
                    const module = await import('./js/firebase.js');
                    const authLib = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
                    // TAMBAHAN: Import Firestore untuk Sinkronisasi Self-Healing
                    const fsLib = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");
                    
                    const persistence = rememberMe ? authLib.browserLocalPersistence : authLib.browserSessionPersistence;
                    await authLib.setPersistence(module.auth, persistence);

                    const userCredential = await authLib.signInWithEmailAndPassword(module.auth, email, password);
                    const user = userCredential.user;

                    // [SINKRONISASI FIRESTORE - Self Healing]
                    // Memastikan dokumen profil Firestore selalu tersinkronisasi dan ada,
                    // sehingga user lama tidak error saat masuk ke modul Kolaborasi.
                    try {
                        const userRef = fsLib.doc(module.db, "users", user.uid);
                        await fsLib.updateDoc(userRef, {
                            lastLogin: Date.now()
                        });
                    } catch (dbError) {
                        // Jika dokumen belum ada (misal pendaftar versi lama), buatkan dokumennya
                        if (dbError.code === 'not-found') {
                            const userRef = fsLib.doc(module.db, "users", user.uid);
                            await fsLib.setDoc(userRef, {
                                uid: user.uid,
                                email: user.email,
                                name: user.displayName || email.split('@')[0],
                                displayName: user.displayName || email.split('@')[0],
                                createdAt: Date.now(),
                                lastLogin: Date.now()
                            });
                        } else {
                            console.warn("Kesalahan koneksi saat sinkronisasi data:", dbError);
                        }
                    }

                    window.location.replace("./pages/dashboard.html");
                    
                } catch (error) {
                    setLoading(false);
                    const errorCode = error.code;
                    if (errorCode === 'auth/wrong-password' || errorCode === 'auth/invalid-credential') {
                        showError("Email atau Password yang Anda masukkan salah.");
                    } else if (errorCode === 'auth/user-not-found') {
                        showError("Akun dengan email tersebut tidak ditemukan.");
                    } else if (errorCode === 'auth/too-many-requests') {
                        showError("Terlalu banyak percobaan gagal. Coba lagi nanti.");
                    } else {
                        showError("Gagal masuk. Periksa koneksi internet Anda.");
                    }
                }
            } else {
                setTimeout(() => {
                    if (email === "admin@creative.io" && password === "admin123") {
                        localStorage.setItem('dummy_logged_in', 'true');
                        window.location.replace("./pages/dashboard.html");
                    } else {
                        setLoading(false);
                        showError("Gagal. Mode lokal gunakan: admin@creative.io / admin123");
                    }
                }, 1000);
            }
        }

        // Listener jika pengguna sudah login, langsung alihkan tanpa perlu isi form lagi
        if (USE_FIREBASE) {
            import('./js/firebase.js').then(module => {
                import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js").then(authLib => {
                    authLib.onAuthStateChanged(module.auth, (user) => {
                        if (user) window.location.replace("./pages/dashboard.html");
                    });
                });
            });
        }
    </script>
</body>
</html>
