<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password - Creative.io</title>
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon-192x192.png">
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#3b82f6">

    <style>
        /* =========================================================
           CSS UTAMA (Dipertahankan 100% Sesuai Desain Anda)
        ========================================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', Arial, sans-serif; min-height: 100vh; overflow-x: hidden; background: linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%); color: #0f172a; display: flex; align-items: center; justify-content: center; padding: 24px; }
        .bg-glow { position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; opacity: 0.5; pointer-events: none; }
        .bg-glow.one { width: 340px; height: 340px; background: rgba(59, 130, 246, 0.15); top: -120px; left: -100px; }
        .bg-glow.two { width: 320px; height: 320px; background: rgba(96, 165, 250, 0.15); bottom: -120px; right: -100px; }
        .wrapper { position: relative; z-index: 2; width: 100%; max-width: 440px; }
        .card { width: 100%; background: rgba(255, 255, 255, 0.9); border: 1px solid rgba(255, 255, 255, 0.8); border-radius: 32px; padding: 42px 36px; backdrop-filter: blur(24px); box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05); }
        .logo { display: flex; align-items: center; justify-content: center; margin-bottom: 24px; }
        .logo-box { width: 56px; height: 56px; border-radius: 18px; background: linear-gradient(135deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .logo-box img { width: 100%; height: 100%; object-fit: cover; }
        .title { font-size: 28px; font-weight: 900; text-align: center; letter-spacing: -0.5px; margin-bottom: 12px; color: #0f172a; }
        .subtitle { font-size: 14px; line-height: 1.6; text-align: center; color: #64748b; margin-bottom: 28px; padding: 0 10px; }
        
        .alert { display: none; padding: 12px 16px; border-radius: 14px; font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 18px; text-align: center; }
        .alert.success { display: block; background: rgba(34, 197, 94, 0.1); color: #15803d; border: 1px solid rgba(34, 197, 94, 0.15); }
        .alert.error { display: block; background: rgba(239, 68, 68, 0.1); color: #dc2626; border: 1px solid rgba(239, 68, 68, 0.15); }
        
        .form-group { margin-bottom: 20px; }
        .label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 8px; color: #1e293b; }
        .input { width: 100%; height: 52px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 16px; padding: 0 18px; font-size: 14px; color: #0f172a; outline: none; transition: all 0.2s ease; }
        .input:focus { border-color: #3b82f6; background: white; box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        .input::placeholder { color: #94a3b8; }
        .reset-btn { width: 100%; height: 52px; border: none; border-radius: 16px; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s ease; margin-top: 8px; }
        .reset-btn:hover { transform: translateY(-2px); background: linear-gradient(135deg, #2563eb, #1d4ed8); }
        .reset-btn:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .footer { margin-top: 28px; text-align: center; font-size: 13px; color: #64748b; }
        .footer a { color: #2563eb; text-decoration: none; font-weight: 700; margin-left: 4px; }
        .footer a:hover { text-decoration: underline; }
        @media(max-width: 600px) { body { padding: 16px; } .card { padding: 40px 24px; border-radius: 28px; } .title { font-size: 26px; } }
    </style>
</head>
<body>

    <div class="bg-glow one"></div>
    <div class="bg-glow two"></div>

    <div class="wrapper">
        <div class="card">
            <div class="logo">
                <div class="logo-box">
                    <img src="./assets/logo.png" alt="Creative.io" onerror="this.style.display='none'; this.parentElement.innerHTML='✨';">
                </div>
            </div>

            <h1 class="title">Reset Password</h1>
            <p class="subtitle">Masukkan email akun Anda. Kami akan mengirimkan instruksi untuk membuat password baru.</p>

            <div id="alertBox" class="alert"></div>

            <form id="resetForm">
                <div class="form-group">
                    <label class="label">Email Terdaftar</label>
                    <input type="email" class="input" id="email" placeholder="contoh@email.com" required autocomplete="email">
                </div>

                <button type="submit" class="reset-btn" id="resetBtn">Kirim Link Reset</button>
            </form>

            <div class="footer">
                Ingat password Anda? <a href="./login.html">Kembali login</a>
            </div>
        </div>
    </div>

    <script src="./js/pwa.js"></script>
